title: LSASS PPL Bypass Attempt
id: c3d4e5f6-1003-001-005
status: stable
description: |
  Detects attempts to bypass LSASS Protected Process Light (PPL),
  which is required for modern credential dumping techniques.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_ppl_bypass:
    Image|endswith:
      - '\mimidrv.sys'
      - '\mimidrv.exe'
    CommandLine|contains:
      - 'mimikatz'
  selection_dbk_core:
    CommandLine|contains|all:
      - 'DriverEntry'
      - 'PsSetLoadImageNotifyRoutine'
  selection_katz_driver:
    Image|endswith:
      - '\mimidrv.sys'
  condition: selection_ppl_bypass or selection_dbk_core or selection_katz_driver
falsepositives:
  - Security research tools (in lab environments)
level: critical

