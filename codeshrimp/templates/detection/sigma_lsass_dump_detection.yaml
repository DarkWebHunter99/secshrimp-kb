title: LSASS Dumping via ProcDump
id: c3d4e5f6-1003-001-002
status: stable
description: |
  Detects ProcDump being used to dump LSASS process memory,
  a common technique for credential extraction.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_procdump_lsass:
    Image|endswith: '\procdump.exe'
    CommandLine|contains: 'lsass'
  selection_procdump_m:
    Image|endswith: '\procdump.exe'
    CommandLine|contains|all:
      - '-ma'
      - 'lsass'
  selection_tasklist_dump:
    Image|endswith: '\tasklist.exe'
    CommandLine|contains|all:
      - '/svc'
      - 'lsass'
  condition: selection_procdump_lsass or selection_procdump_m or selection_tasklist_dump
falsepositives:
  - IT troubleshooting with ProcDump
  - Legitimate LSASS debugging
level: high

