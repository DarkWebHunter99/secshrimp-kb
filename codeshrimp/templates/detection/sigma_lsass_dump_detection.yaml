title: Suspicious Access to SAM/SYSTEM/SECURITY Hives
id: c3d4e5f6-1003-001-006
status: stable
description: |
  Detects direct access to SAM, SYSTEM, and SECURITY registry hives
  for offline credential extraction.
references:
  - https://attack.mitre.org/techniques/T1003/002/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1003.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_reg_sam:
    CommandLine|contains|all:
      - 'reg'
      - 'save'
      - 'SAM'
  selection_reg_system:
    CommandLine|contains|all:
      - 'reg'
      - 'save'
      - 'SYSTEM'
  selection_reg_security:
    CommandLine|contains|all:
      - 'reg'
      - 'save'
      - 'SECURITY'
  selection_reg_dump_all:
