title: Credential Dumping via PowerShell MiniDump
id: c3d4e5f6-1003-001-004
status: stable
description: |
  Detects PowerShell using MiniDump or Out-Minidump to extract LSASS,
  a common attack technique in PowerShell-based frameworks.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_minidump:
    CommandLine|contains:
      - 'Out-Minidump'
      - 'MiniDumpWriteDump'
      - 'Get-Process lsass'
      - 'Invoke-Mimikatz'
      - 'DumpCreds'
      - 'sekurlsa'
  selection_lsass_access_ps:
    CommandLine|contains|all:
      - 'lsass'
      - 'dump'
  condition: selection_powershell and (selection_minidump or selection_lsass_access_ps)
falsepositives:
  - Security research and testing
level: critical

