# ============================================================
# MITRE ATT&CK T1003.001 — LSASS Memory Dumping Detection
# ============================================================
# Technique: T1003.001 - OS Credential Dumping: LSASS Memory
# Platform: Windows
# Tactics: Credential Access
# Covers: Mimikatz, ProcDump, comsvcs.dll, nanodump, PPL bypass
# ============================================================

title: LSASS Memory Dumping via Direct Access
id: c3d4e5f6-1003-001-001
status: stable
description: |
  Detects processes accessing LSASS memory directly, which is the primary
  indicator of credential dumping tools like Mimikatz, ProcDump, nanodump,
  and other LSASS memory extraction techniques.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://www.elastic.co/guide/en/security/current/credential-dumping-lsass.html
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection_lsass_access:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess:
      - '0x1010'   # PROCESS_QUERY_LIMITED_INFORMATION | PROCESS_VM_READ
      - '0x1410'   # + PROCESS_CREATE_PROCESS
      - '0x1FFFFF'  # PROCESS_ALL_ACCESS
      - '0x1438'    # COMMON combinations
  filter_legitimate:
    SourceImage|endswith:
      - '\csrss.exe'
      - '\wininit.exe'
      - '\svchost.exe'
      - '\wmiprvse.exe'
      - '\MsMpEng.exe'         # Windows Defender
      - '\MsSense.exe'         # Windows Defender ATP
      - '\SenseIR.exe'
      - '\SenseCncProxy.exe'
      - '\sqlservr.exe'        # SQL Server
      - '\msiexec.exe'         # MSI installer (temp)
    GrantedAccess:
      - '0x1010'
      - '0x1410'
  condition: selection_lsass_access and not filter_legitimate
falsepositives:
  - Windows Defender and Defender ATP scanning LSASS
  - SQL Server accessing LSASS
  - Some legitimate management tools
level: critical

