# ============================================================
# T1070.003 — Clear Command History
# ============================================================

title: Command History Cleared on Windows
id: f6a7b8c9-1070-003-001
status: experimental
description: 检测清除 Windows 命令行历史记录
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1070.003
logsource:
  product: windows
  category: process_creation
detection:
  selection_doskey:
    Image|endswith: '\cmd.exe'
    CommandLine|contains: 'doskey /reinstall'
  selection_ps_history:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Remove-Item (Get-PSReadLineOption).HistorySavePath'
      - 'Clear-History'
      - 'Set-PSReadlineOption -HistorySaveStyle'
  selection_history_file:
    Image|endswith: '\cmd.exe'
    CommandLine|contains|all:
      - 'del'
      - 'ConsoleHost_history.txt'
  condition: selection_doskey or selection_ps_history or selection_history_file
falsepositives:
  - 用户清理个人命令历史
level: medium

---

title: PowerShell Transcript and Script Block Logging Disabled
id: f6a7b8c9-1070-003-002
status: experimental
description: 检测禁用 PowerShell 日志记录（Transcript 和 ScriptBlock Logging）
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1070.003
logsource:
  product: windows
  category: process_creation
detection:
  selection_transcript:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|all:
      - 'Set-ItemProperty'
      - 'EnableTranscripting'
      - '0'
  selection_scriptblock:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|all:
      - 'Set-ItemProperty'
      - 'ScriptBlockLogging'
      - '0'
  selection_reg_direct:
    Image|endswith: '\reg.exe'
    CommandLine|contains|all:
      - 'add'
      - 'Microsoft\Windows\PowerShell'
  condition: selection_transcript or selection_scriptblock or selection_reg_direct
falsepositives:
  - 合法的 PowerShell 日志策略管理
level: high

