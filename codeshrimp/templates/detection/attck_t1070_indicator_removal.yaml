# ============================================================
# T1070.007 — Clear Network Connection History
# ============================================================

title: Network Connection History Cleared
id: f6a7b8c9-1070-007-001
status: experimental
description: 检测清除网络连接历史记录（ARP 缓存、路由表、DNS 缓存）
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1070.007
logsource:
  product: windows
  category: process_creation
detection:
  selection_arp:
    Image|endswith: '\cmd.exe'
    CommandLine|contains: 'arp -d *'
  selection_route:
    Image|endswith: '\cmd.exe'
    CommandLine|contains: 'route /f'
  selection_dns:
    Image|endswith: '\cmd.exe'
    CommandLine|contains: 'ipconfig /flushdns'
  selection_netsh:
    Image|endswith: '\netsh.exe'
    CommandLine|contains:
      - 'firewall reset'
      - 'reset all'
  selection_powershell_net:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Clear-DnsClientCache'
      - 'Reset-NetIPConfiguration'
      - 'Remove-NetRoute'
  condition: selection_arp or selection_route or selection_dns or selection_netsh or selection_powershell_net
falsepositives:
  - 网络配置重置脚本
  - IT 管理操作
level: medium

---

