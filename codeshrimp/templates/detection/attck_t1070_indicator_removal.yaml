# ============================================================
# T1070.002 — Clear Linux/Mac System Logs
# ============================================================

title: Linux System Log Cleared
id: f6a7b8c9-1070-002-001
status: experimental
description: 检测清除 Linux 系统日志文件
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1070.002
logsource:
  category: process_creation
  product: linux
detection:
  selection_truncate:
    Image|endswith:
      - '/truncate'
      - '/sh'
      - '/bash'
    CommandLine|contains:
      - '/var/log/'
      - 'syslog'
      - 'auth.log'
      - 'kern.log'
      - 'messages'
      - 'secure'
  selection_rm_log:
    Image|endswith:
      - '/rm'
      - '/sh'
      - '/bash'
    CommandLine|contains:
      - '/var/log/'
      - 'wtmp'
      - 'btmp'
      - 'lastlog'
  selection_journalctl:
    Image|endswith: '/journalctl'
    CommandLine|contains:
      - '--vacuum-time'
      - '--vacuum-size'
  selection_shred:
    Image|endswith: '/shred'
    CommandLine|contains:
      - '/var/log/'
      - 'wtmp'
      - 'btmp'
  condition: selection_truncate or selection_rm_log or selection_journalctl or selection_shred
falsepositives:
  - 合法的日志管理操作
  - logrotate 执行
level: high

