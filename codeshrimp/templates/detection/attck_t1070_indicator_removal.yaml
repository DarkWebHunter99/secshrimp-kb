# Purpose: Sigma 检测规则 — MITRE T1070 Indicator Removal on Host（主机痕迹清除）
# Auth: 仅限授权使用 — 仅用于自有/授权网络的 SIEM 部署
# Dependencies: Sigma 2.0+, Winlogbeat/Elastic Agent 日志收集
# Coverage:
#   T1070.001 (Clear Windows Event Logs)
#   T1070.002 (Clear Linux/Mac System Logs)
#   T1070.003 (Clear Command History)
#   T1070.004 (File Deletion)
#   T1070.005 (Network Share Connection Removal)
#   T1070.006 (Timestomp)
#   T1070.007 (Clear Network Connection History)
# Rule IDs: f6a7b8c9-1070-xxx-xxx
# Reference: https://attack.mitre.org/techniques/T1070/

title: Indicator Removal on Host - T1070 Detection Suite
id: f6a7b8c9-1070-000-000
status: experimental
author: CodeShrimp
date: 2026/05/11
description: |
  检测攻击者在主机上清除痕迹的各种技术。
  T1070 覆盖 7 个子技术，是攻击链中防御规避阶段的核心。
  攻击者在完成目标后清除日志、文件、连接记录等以逃避检测。

---

# ============================================================
# T1070.001 — Clear Windows Event Logs
# ============================================================

title: Windows Event Log Cleared via wevtutil
id: f6a7b8c9-1070-001-001
status: experimental
description: 检测 wevtutil 命令清除 Windows 事件日志
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\wevtutil.exe'
  action_clear:
    CommandLine|contains:
      - 'clear-log'
      - 'cl '
      - 'clean-log'
  suspicious_log:
    CommandLine|contains:
      - 'Security'
      - 'System'
      - 'Application'
      - 'PowerShell'
      - 'Microsoft-Windows-Sysmon'
      - 'Microsoft-Windows-Windows Defender'
      - 'Microsoft-Windows-TaskScheduler'
      - 'Setup'
  wildcard_clear:
    CommandLine|contains:
      - ' *'
      - ' /q:'
  condition: selection and (action_clear or suspicious_log or wildcard_clear)
falsepositives:
  - IT 管理员定期清理日志（应有变更工单记录）
  - 日志轮转脚本
level: high

---

