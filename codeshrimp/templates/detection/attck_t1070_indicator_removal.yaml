# ============================================================
# T1070.004 — File Deletion
# ============================================================

title: Suspicious File Deletion After Compromise
id: f6a7b8c9-1070-004-001
status: experimental
description: 检测删除可疑文件（工具、payload、日志文件）
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1070.004
logsource:
  product: windows
  category: process_creation
detection:
  selection_del:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  del_tools:
    CommandLine|contains:
      - 'del '
      - 'Remove-Item'
      - 'rm '
      - 'rmdir '
  suspicious_files:
    CommandLine|contains:
      - '.exe'
      - '.dll'
      - '.ps1'
      - '.bat'
      - '.vbs'
      - '.hta'
      - '.sct'
  temp_paths:
    CommandLine|contains:
      - '\AppData\Local\Temp\'
      - '\Windows\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
  condition: selection_del and del_tools and suspicious_files and temp_paths
falsepositives:
  - 清理临时文件
  - 软件安装后清理
level: high

