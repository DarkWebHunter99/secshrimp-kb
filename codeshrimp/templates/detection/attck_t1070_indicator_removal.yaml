# ============================================================
# 综合场景 — 多种痕迹清除行为检测
# ============================================================

title: Multiple Indicator Removal Techniques in Short Timeframe
id: f6a7b8c9-1070-999-001
status: experimental
description: |
  检测短时间内使用多种痕迹清除技术，可能为攻击链清理阶段。
  攻击者通常在完成目标后依次清除日志、删除工具、清除连接记录。
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1070
logsource:
  product: windows
  category: process_creation
detection:
  selection_indicator_removal:
    Image|endswith:
      - '\wevtutil.exe'
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  removal_commands:
    CommandLine|contains:
      - 'clear-log'
      - 'Clear-EventLog'
      - 'del '
      - 'Remove-Item'
      - 'doskey /reinstall'
      - 'arp -d *'
      - 'route /f'
      - 'ipconfig /flushdns'
      - 'Clear-History'
      - 'Set-ItemProperty'
  condition: selection_indicator_removal and removal_commands
  timeframe: 10m
  condition2: count(Image) by Hostname > 3
falsepositives:
  - IT 运维批量操作
  - 系统维护脚本
level: high
