title: PowerShell - RunSpace Remote Execution Detection
id: f8a1b2c3-1059-001-003
status: experimental
description: |
  Detects PowerShell RunSpace usage for out-of-process execution. Attackers use
  RunSpaces to create independent PowerShell runspaces that bypass ScriptBlock logging,
  AMSI, and other in-process defenses. Common in Empire, Cobalt Strike, and custom C2 frameworks.
  RunSpace execution from C# or Python is especially suspicious.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/dotnet/api/system.management.automation.runspaces
  - https://github.com/BC-SECURITY/Empire
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1055
logsource:
  category: process_creation
  product: windows
detection:
  selection_runspace_create:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'RunspaceFactory.CreateRunspace'
      - 'InitialSessionState'
      - 'RunspacePool'
      - 'CreatePipeline()'

  selection_runspace_invoke:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'InvokeAsync('
      - 'BeginInvoke('
      - '$runspace.Invoke('
      - 'Pipeline.Invoke('

  selection_out_of_proc:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'powershell -noe'
      - 'powershell -noni'
      - 'powershell -nop'
      - 'powershell -w hidden'
      - 'pwsh -noe'
      - 'pwsh -noni'

  condition: selection_runspace_create or selection_runspace_invoke or selection_out_of_proc
falsepositives:
  - Exchange Server RunSpace usage for mailbox management
  - Azure Automation runbooks
  - DSC (Desired State Configuration) push operations
level: high

