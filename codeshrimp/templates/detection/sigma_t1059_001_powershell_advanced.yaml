title: PowerShell - COM Object Hijacking Detection
id: f8a1b2c3-1059-001-004
status: experimental
description: |
  Detects PowerShell COM object creation with suspicious ProgIDs commonly abused
  for code execution. WScript.Shell, Shell.Application, and Scripting.FileSystemObject
  are legitimate COM objects frequently abused by attackers for process execution,
  file operations, and registry manipulation.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1218/
  - https://docs.microsoft.com/en-us/windows/win32/com/com-programming-overview
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
logsource:
  category: process_creation
  product: windows
detection:
  selection_com_execution:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'New-Object -COM'
      - 'New-Object -ComObject'
      - 'New-Object COM.'
      - '[activator]::CreateInstance'
    CommandLine|contains:
      - 'WScript.Shell'
      - 'Shell.Application'
      - 'Scripting.FileSystemObject'
      - 'WbemScripting.SWbemLocator'
      - 'Schedule.Service'
      - 'XMLDOM'

  selection_com_run:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '.Run('
      - '.ShellExecute('
      - '.Exec('
      - '.Invoke()'
    CommandLine|contains:
      - 'New-Object -COM'
      - 'New-Object -ComObject'

  selection_suspicious_com:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'MSScriptControl.ScriptControl'
      - 'SQLDMO.SQLServer'
      - 'Scripting.Signer'
      - 'MMC20.Application'

  condition: selection_com_execution or selection_com_run or selection_suspicious_com
falsepositives:
  - SCCM/ConfigMgr COM automation
  - Exchange management scripts using COM
  - Legacy application deployment scripts
level: medium

