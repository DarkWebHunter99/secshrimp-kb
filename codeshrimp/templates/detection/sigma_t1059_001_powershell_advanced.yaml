title: PowerShell - Suspicious Process Injection via PowerShell
id: f8a1b2c3-1059-001-010
status: experimental
description: |
  Detects PowerShell performing process injection techniques including process
  hollowing, thread execution, and APC injection. These techniques are used by
  Cobalt Strike, Empire, and modern RAT frameworks to execute code in legitimate
  process contexts.
references:
  - https://attack.mitre.org/techniques/T1055/
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/mgeeky/Process-Hollowing
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.defense_evasion
  - attack.t1055
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_injection_api:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'WriteProcessMemory'
      - 'NtWriteVirtualMemory'
      - 'CreateRemoteThread'
      - 'NtCreateThreadEx'
      - 'QueueUserAPC'
      - 'NtQueueApcThread'
      - 'RtlCreateUserThread'

  selection_process_hollow:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'NtUnmapViewOfSection'
      - 'ZwUnmapViewOfSection'
      - 'GetThreadContext'
      - 'SetThreadContext'
      - 'ResumeThread'
    CommandLine|contains:
      - 'CREATE_SUSPENDED'

  selection_early_hook:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'SetWindowsHookEx'
      - 'NtSetInformationThread'
      - 'NtAlertResumeThread'
      - 'NtMapViewOfSection'

  condition: selection_injection_api or selection_process_hollow or selection_early_hook
falsepositives:
  - Anti-malware tools performing legitimate injection
  - Application compatibility shims
  - Security research tools
level: critical
