title: PowerShell - Script Block Obfuscation Detection
id: f8a1b2c3-1059-001-006
status: experimental
description: |
  Detects PowerShell script block obfuscation techniques used to evade AMSI and
  ScriptBlock logging. Includes tick mark insertion, string substitution (REPLACE),
  XOR encoding, base64 in string context, and format string abuse.
references:
  - https://attack.mitre.org/techniques/T1027/010/
  - https://github.com/danielbohannon/Invoke-Obfuscation
  - https://github.com/danielbohannon/ISESteroids
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.defense_evasion
  - attack.t1027.010
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_tick_obfuscation:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|re: '`[a-zA-Z]`[a-zA-Z]'  # Tick marks between characters

  selection_replace_obfuscation:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-replace'
    CommandLine|contains:
      - "'"
      - '"'
    # Pattern: string with many -replace operations chained
    CommandLine|re: "('.*'-replace.*'.*'-replace.*'.*'-replace)"

  selection_xor_obfuscation:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-bxor'
      - '-band'
      - '-bshl'
    CommandLine|contains:
      - '[char]'
      - '-join'

  selection_format_string:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-f '
      - '-format'
    CommandLine|contains:
      - '{0}'
      - '{1}'
      - '{2}'
    # Multiple format string substitutions indicate obfuscation
    CommandLine|re: '\{[0-9]\}.*\{[0-9]\}.*\{[0-9]\}'

  selection_concat_obfuscation:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-join'
      - '[char]'
    CommandLine|contains:
      - '('
      - ')'
    # Pattern: join of many char values
    CommandLine|re: '\-join\s*\(.*\[char\]'

  condition: selection_tick_obfuscation or selection_replace_obfuscation or selection_xor_obfuscation or selection_format_string or selection_concat_obfuscation
falsepositives:
  - Legitimate string manipulation in scripts
  - Internationalization scripts using format strings
  - Developer testing of obfuscation detection
level: medium

