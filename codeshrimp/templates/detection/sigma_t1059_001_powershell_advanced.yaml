title: PowerShell - Suspicious Download and Execution Pattern
id: f8a1b2c3-1059-001-009
status: experimental
description: |
  Detects advanced PowerShell download cradle patterns beyond basic Invoke-WebRequest.
  Covers WebClient stream-based downloads, certificate bypass downloads, and
  OneDrive/SharePoint abuse for payload delivery.
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://attack.mitre.org/techniques/T1059/001/
  - https://www.fireeye.com/content/dam/fireeye-www/global/en/current-threats/pdfs/wp-windows-management-instrumentation.pdf
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.001
  - attack.command_and_control
  - attack.t1105
logsource:
  category: process_creation
  product: windows
detection:
  selection_webclient_stream:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Net.WebClient'
      - 'WebClient'
    CommandLine|contains:
      - '.DownloadData('
      - '.DownloadString('
      - '.OpenRead('
      - '.GetResponseStream('

  selection_invoke_restmethod:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Invoke-RestMethod'
      - 'irm'
    CommandLine|contains:
      - '| iex'
      - '| Invoke-Expression'
      - '| iex)'
      - '-UseBasicParsing'

  selection_cert_bypass:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '[System.Net.ServicePointManager]::SecurityProtocol'
      - 'ServerCertificateValidationCallback'
      - 'NET::ServerCertificateValidationCallback'
      - 'IgnoreCertificate'

  selection_cloud_share_download:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'onedrive.live.com'
      - 'sharepoint.com'
      - 'docs.google.com'
      - 'raw.githubusercontent.com'
      - 'paste.ee'
      - 'hastebin.com'
      - 'pastebin.com'

  condition: selection_webclient_stream or selection_invoke_restmethod or selection_cert_bypass or selection_cloud_share_download
falsepositives:
  - Azure/AWS CLI operations from PowerShell
  - Software update scripts downloading from cloud storage
  - Developer scripts fetching from GitHub
level: high

