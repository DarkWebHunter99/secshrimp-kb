# Sigma Rules: T1059.001 PowerShell Advanced Execution Detection
# MITRE ATT&CK: T1059.001 - Command and Scripting Interpreter: PowerShell
# Covers: 反射PE加载 / 反序列化 / RunSpace远程执行 / COM劫持 / 类滥用 / Add-Type原生执行 / 脚本块混淆
