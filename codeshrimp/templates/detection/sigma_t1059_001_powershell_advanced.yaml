title: PowerShell - AMSI Bypass Attempt Detection
id: f8a1b2c3-1059-001-008
status: experimental
description: |
  Detects attempts to bypass Windows Antimalware Scan Interface (AMSI). AMSI provides
  deep content inspection for PowerShell scripts. Attackers bypass it by patching
  amsiInitFailed, using reflection to modify AMSI internals, or loading from non-scanned
  paths. These techniques are almost exclusively malicious.
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://amsi.fail/
  - https://github.com/rasta-mouse/AmsiScanner
  - https://github.com/S3cur3tySh3ll/AMSI_Bypass_Powershell
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_amsi_patch:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'amsiInitFailed'
      - 'AmsiOpenSession'
      - 'AmsiScanBuffer'
      - 'AmsiUtils'
      - 'amsi.dll'

  selection_amsi_reflection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '[System.Reflection.Assembly]'
    CommandLine|contains:
      - 'AMSI'
      - 'amsi'

  selection_amsi_context_mod:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'SetAmsiContext'
      - 'AmsiContext'
      - 'AmsiSession'

  selection_amsi_disable_policy:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'DisableRealtimeMonitoring'
      - 'Set-MpPreference'
      - 'Add-MpPreference'
    CommandLine|contains:
      - '-Disable'
      - 'ExclusionPath'
      - 'ExclusionProcess'

  condition: selection_amsi_patch or selection_amsi_reflection or selection_amsi_context_mod or selection_amsi_disable_policy
falsepositives:
  - Security researchers testing AMSI bypass techniques
  - Red team engagements (with proper authorization)
level: critical

