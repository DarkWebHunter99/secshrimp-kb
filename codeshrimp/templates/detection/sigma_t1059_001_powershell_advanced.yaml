title: PowerShell - Add-Type Native Code Execution Detection
id: f8a1b2c3-1059-001-005
status: experimental
description: |
  Detects PowerShell Add-Type usage for compiling and executing C#/VB.NET code
  inline. Attackers use Add-Type to call Win32 APIs directly, bypass PowerShell
  language restrictions, and execute shellcode. Add-Type with DllImport or
  unsafe code blocks is especially suspicious.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.utility/add-type
  - https://github.com/mgeeky/Shellcode/blob/master/Invoke-Shellcode.ps1
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
logsource:
  category: process_creation
  product: windows
detection:
  selection_addtype_winapi:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Add-Type'
    CommandLine|contains:
      - 'DllImport'
      - 'kernel32'
      - 'ntdll'
      - 'VirtualAlloc'
      - 'VirtualProtect'
      - 'CreateThread'
      - 'RtlMoveMemory'
      - 'NtCreateThreadEx'

  selection_addtype_unsafe:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Add-Type'
    CommandLine|contains:
      - 'unsafe'
      - 'AllowUnsafeBlocks'
      - 'fixed ('
      - 'Marshal.Copy'

  selection_addtype_shellcode:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Add-Type'
    CommandLine|contains:
      - '0xfc'
      - '0xe8'
      - '0x48'             # Common shellcode opcodes
      - '$bytes = @('
      - '[byte[]]'

  condition: selection_addtype_winapi or selection_addtype_unsafe or selection_addtype_shellcode
falsepositives:
  - Legitimate C# compilation in PowerShell scripts
  - Custom module development using Add-Type
  - P/Invoke calls for system information queries
level: high

