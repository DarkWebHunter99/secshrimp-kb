---

title: PowerShell - Reflective PE Injection Detection
id: f8a1b2c3-1059-001-001
status: experimental
description: |
  Detects PowerShell commands that perform reflective PE loading — loading DLLs/EXEs
  directly from memory without writing to disk. Common in Cobalt Strike Beacon,
  PowerSploit Invoke-ReflectivePEInjection, and similar offensive tools.
  Attackers use this to execute malicious payloads while evading AV/EDR file-based detection.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/cobbr/Invoke-Shellcode
  - https://github.com/cobbr/Invoke-ReflectivePEInjection
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1620
logsource:
  category: process_creation
  product: windows
detection:
  selection_invoke_reflection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Invoke-ReflectivePEInjection'
      - 'Invoke-Shellcode'
      - 'Invoke-WCMethod'
      - 'Reflection.Assembly'
      - '[System.Reflection.Assembly]::Load'
      - 'Assembly.Load('

  selection_marshal_copy:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Marshal::Copy'
      - 'VirtualAlloc'
      - 'VirtualProtect'
      - 'RtlMoveMemory'
      - 'NtCreateThreadEx'

  selection_pe_header:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '0x5A4D'          # MZ header
      - 'MZ'              # Direct MZ reference
      - 'PE header'

  condition: selection_invoke_reflection or selection_marshal_copy or selection_pe_header
falsepositives:
  - Legitimate .NET assembly loading in development environments
  - SCCM/Intune PowerShell deployments using Assembly.Load
  - PowerShell modules that dynamically load assemblies
level: high

