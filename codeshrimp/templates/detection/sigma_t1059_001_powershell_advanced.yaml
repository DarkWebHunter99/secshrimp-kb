title: PowerShell - Deserialization Attack Detection
id: f8a1b2c3-1059-001-002
status: experimental
description: |
  Detects PowerShell deserialization attacks using BinaryFormatter, TypeConfuser,
  or known gadget chains (PSObject, Vector, DataSet, WindowsIdentity). Deserialization
  vulnerabilities allow remote code execution by crafting malicious serialized objects.
  High severity — most deserialization in PowerShell is malicious outside dev contexts.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/dotnet/standard/serialization/binaryformatter-security-guide
  - https://github.com/bowserlab/Invoke-ExpressionDeserialization
author: Heartbeat-AutoGen
date: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.001
  - attack.initial_access
logsource:
  category: process_creation
  product: windows
detection:
  selection_binary_formatter:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'BinaryFormatter'
      - 'Deserialize('
      - 'Formatterservices.Binary'

  selection_gadget_chains:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'TypeConfuser'
      - 'PSObject'
      - 'WindowsIdentity'
      - 'DataSet'
      - 'Vector`1'
      - 'Func`2'

  selection_pseudo_console:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Invoke-Expression'
      - 'IEX'
      - 'Invoke-Command'
      - 'ICM'
    CommandLine|contains:
      - 'FromBase64String'
      - '-join'

  condition: selection_binary_formatter or selection_gadget_chains or (selection_pseudo_console and selection_gadget_chains)
falsepositives:
  - Application deserialization in .NET development
  - Legacy application migration with BinaryFormatter
level: critical

