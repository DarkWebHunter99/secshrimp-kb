# Purpose: Sigma 检测规则 — Living off the Land (LOTL) 无文件攻击
# Auth: 仅限授权使用 — 仅用于自有/授权网络的 SIEM 部署
# Dependencies: Sigma 2.0+, Winlogbeat/Elastic Agent 日志收集
# Coverage:
#   T1059.001 (PowerShell), T1047 (WMI), T1197 (BITS Jobs),
#   T1218 (Signed Binary Proxy Execution), T1036 (Masquerading),
#   T1055 (Process Injection), T1569 (Service Execution)
# Rule IDs: e5f6a7b8-xxxx-xxx-xxx
# Reference: https://attack.mitre.org/tactics/enterprise/

title: Living off the Land (LOTL) Attack Detection Suite
id: e5f6a7b8-lotl-000-000
status: experimental
author: CodeShrimp
date: 2026/05/11
description: |
  检测利用系统自带工具进行无文件攻击的行为。
  LOTL 攻击不落地恶意文件，使用合法系统工具完成攻击链，
  传统文件扫描无法检测。本规则集覆盖主要 LOTL 技术。

---

# ============================================================
# 1. BITS Job 滥用 — 后台智能传输服务用于下载/持久化
# ============================================================
# T1197 - BITS Jobs
# BITS 可在后台下载文件，绕过网络监控，且支持持久化（重启后续传）

title: Suspicious BITS Job Download from Uncommon URL
id: e5f6a7b8-1197-001-001
status: experimental
description: 检测 BITS 任务从不常见 URL 下载文件，常见于恶意软件下载阶段
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1197/
tags:
  - attack.persistence
  - attack.defense_evasion
  - attack.t1197
logsource:
  product: windows
  service: bits-client
detection:
  selection:
    EventID: 16384  # BITS job completed
  suspicious_url:
    RemoteName|contains:
      - 'pastebin.com'
      - 'githubusercontent.com'
      - 'mega.nz'
      - 'drive.google.com'
      - 'dropbox.com'
      - '.onion'
      - 'transfer.sh'
      - 'gofile.io'
  suspicious_extension:
    RemoteName|endswith:
      - '.exe'
      - '.ps1'
      - '.bat'
      - '.vbs'
      - '.dll'
      - '.zip'
  condition: selection and (suspicious_url or suspicious_extension)
falsepositives:
  - 合法软件更新使用 BITS
  - 企业内部分发系统
level: high

---

title: BITS Job Persistence via Custom Notification Command
id: e5f6a7b8-1197-001-002
status: experimental
description: BITS 支持在任务完成后执行命令（SetNotifyCmdLine），攻击者利用此特性实现持久化
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1197/
tags:
  - attack.persistence
  - attack.t1197
logsource:
  product: windows
  service: bits-client
detection:
  selection:
    EventID: 16384
  notify_cmd:
    NotificationCmdLine|contains:
      - 'powershell'
      - 'cmd.exe'
      - 'wscript'
      - 'cscript'
      - 'mshta'
      - 'rundll32'
  condition: selection and notify_cmd
falsepositives:
  - 系统管理工具使用 BITS 通知功能
level: critical

---

# ============================================================
# 2. WMI 持久化与远程执行 — 无文件攻击核心技术
# ============================================================
# T1047 - Windows Management Instrumentation

title: WMI Remote Command Execution via Invoke-WmiMethod
id: e5f6a7b8-1047-001-001
status: experimental
description: 检测通过 WMI 远程执行命令，常见于横向移动
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1047/
tags:
  - attack.execution
  - attack.lateral_movement
  - attack.t1047
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|all:
      - 'Invoke-WmiMethod'
      - 'Create'
  suspicious_payload:
    CommandLine|contains:
      - '-enc'
      - '-EncodedCommand'
      - 'IEX'
      - 'Invoke-Expression'
      - 'DownloadString'
      - 'cmd.exe'
      - 'net user'
      - 'net localgroup'
  condition: selection and suspicious_payload
falsepositives:
  - 企业管理软件使用 WMI 远程管理
  - SCCM/Ansible 自动化脚本
level: high

---

title: WMI Process Call Create Remote Execution
id: e5f6a7b8-1047-001-002
status: experimental
description: 检测 Win32_Process.Create 远程调用，WMI 横向移动经典技术
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.execution
  - attack.lateral_movement
  - attack.t1047
logsource:
  product: windows
  category: process_creation
detection:
  selection_wmiprvse:
    ParentImage|endswith: '\wmiprvse.exe'
  suspicious_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  suspicious_cmd:
    CommandLine|contains:
      - '/c'
      - '-enc'
      - 'IEX'
      - 'DownloadString'
      - 'net user'
      - 'reg add'
      - 'schtasks'
  condition: selection_wmiprvse and suspicious_child and suspicious_cmd
falsepositives:
  - 企业管理软件
level: high

