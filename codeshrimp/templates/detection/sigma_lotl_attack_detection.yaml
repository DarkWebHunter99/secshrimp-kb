# ============================================================
# 5. Certutil 滥用 — 下载/编码/解码
# ============================================================
# T1105 - Ingress Tool Transfer, T1140 - Deobfuscate/Decode Files

title: Certutil Download or Decode Operation
id: e5f6a7b8-1105-001-001
status: experimental
description: 检测 certutil 用于下载文件（-urlcache）或解码文件（-decode），LOTL 经典技术
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://attack.mitre.org/techniques/T1140/
tags:
  - attack.command_and_control
  - attack.defense_evasion
  - attack.t1105
  - attack.t1140
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\certutil.exe'
  download:
    CommandLine|contains:
      - '-urlcache'
      - '-split'
  decode_encode:
    CommandLine|contains:
      - '-decode'
      - '-encode'
  network_target:
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'ftp://'
  condition: selection and (download or decode_encode or network_target)
falsepositives:
  - 企业 PKI 管理中的合法 certutil 使用（极少涉及 -urlcache/-decode）
level: high

---

# ============================================================
# 6. MSHTA 滥用 — 执行远程/内联脚本
# ============================================================
# T1218.005 - Signed Binary Proxy Execution: Mshta

title: MSHTA Executing Remote or Inline Script
id: e5f6a7b8-1218-005-001
status: experimental
description: 检测 mshta.exe 执行远程 HTA 或内联 JavaScript/VBScript
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1218/005/
tags:
  - attack.defense_evasion
  - attack.t1218.005
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\mshta.exe'
  remote_execution:
    CommandLine|contains:
      - 'http://'
      - 'https://'
  inline_script:
    CommandLine|contains:
      - 'javascript:'
      - 'vbscript:'
      - 'eval('
      - 'CreateObject'
      - 'WScript.Shell'
      - 'Shell.Application'
  suspicious_parent:
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\winword.exe'
      - '\excel.exe'
  condition: selection and (remote_execution or inline_script or suspicious_parent)
falsepositives:
  - HTA 应用程序正常使用（极少）
  - SCCM 部署脚本
level: high

---

# ============================================================
# 7. 进程注入检测 — 无文件攻击横向移动
# ============================================================
# T1055 - Process Injection

title: Process Injection via Rundll32 with Suspicious DLL
id: e5f6a7b8-1055-001-001
status: experimental
description: 检测 rundll32 加载可疑 DLL，常见于进程注入和代理执行
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1055/
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055
  - attack.t1218.011
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\rundll32.exe'
  suspicious_dll:
    CommandLine|contains:
      - '\AppData\'
      - '\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
      - 'javascript:'
      - 'mshtml'
  suspicious_entry:
    CommandLine|contains:
      - 'DllRegisterServer'
      - 'DllGetClassObject'
      - 'Start'
      - 'EntryPoint'
  no_parent_explorer:
    ParentImage|endswith:
      - '\explorer.exe'
  condition: selection and (suspicious_dll or suspicious_entry) and not no_parent_explorer
falsepositives:
  - 合法软件使用 rundll32 调用系统 DLL
level: medium

---

title: Suspicious Process Hollowing Indicators
id: e5f6a7b8-1055-001-002
status: experimental
description: 检测进程镂空（Process Hollowing）的命令行特征
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1055.012
logsource:
  product: windows
  category: process_creation
detection:
  selection_legit_process:
    Image|endswith:
      - '\svchost.exe'
      - '\csrss.exe'
      - '\winlogon.exe'
      - '\lsass.exe'
      - '\wininit.exe'
      - '\dwm.exe'
      - '\taskhostw.exe'
  suspicious_parent:
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  no_commandline:
    CommandLine: ''
  condition: selection_legit_process and suspicious_parent and no_commandline
falsepositives:
  - 正常系统进程管理
level: critical

