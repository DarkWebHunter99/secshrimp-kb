# ============================================================
# 3. 计划任务滥用 — 持久化与权限提升
# ============================================================
# T1053.005 - Scheduled Task/Job: Scheduled Task

title: Scheduled Task Creation with Suspicious Command
id: e5f6a7b8-1053-005-001
status: experimental
description: 检测创建计划任务时使用可疑命令，如 PowerShell 编码、下载执行等
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1053/005/
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1053.005
logsource:
  product: windows
  category: process_creation
detection:
  selection_tool:
    Image|endswith:
      - '\schtasks.exe'
    CommandLine|contains: '/create'
  suspicious_command:
    CommandLine|contains:
      - '-enc'
      - '-EncodedCommand'
      - 'IEX'
      - 'Invoke-Expression'
      - 'DownloadString'
      - 'bypass'
      - '-WindowStyle Hidden'
      - '-NoProfile'
      - 'FromBase64String'
  suspicious_program:
    CommandLine|contains:
      - 'cmd.exe /c'
      - 'wscript'
      - 'cscript'
      - 'mshta'
      - 'rundll32'
      - 'regsvr32'
  condition: selection_tool and (suspicious_command or suspicious_program)
falsepositives:
  - 企业计划任务部署系统
  - 软件安装器创建的更新任务
level: high

---

title: Scheduled Task Created with SYSTEM Privileges by Non-System Process
id: e5f6a7b8-1053-005-002
status: experimental
description: 检测非系统进程以 SYSTEM 权限创建计划任务，可能为权限提升
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1053.005
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  user_system:
    User: 'NT AUTHORITY\SYSTEM'
  exclude_legitimate:
    ParentImage|endswith:
      - '\services.exe'
      - '\svchost.exe'
      - '\msmpeng.exe'
      - '\tiworker.exe'
      - '\trustedinstaller.exe'
  condition: selection and user_system and not exclude_legitimate
falsepositives:
  - Windows 更新服务
  - 系统维护任务
level: medium

