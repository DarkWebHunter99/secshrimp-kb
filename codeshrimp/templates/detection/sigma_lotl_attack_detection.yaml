# ============================================================
# 4. 服务滥用 — 创建恶意服务/修改现有服务
# ============================================================
# T1569.002 - Service Execution, T1543.003 - Create or Modify System Process: Windows Service

title: Service Created with Suspicious Binary Path
id: e5f6a7b8-1569-002-001
status: experimental
description: 检测创建 Windows 服务时使用可疑二进制路径
author: CodeShrimp
date: 2026/05/11
references:
  - https://attack.mitre.org/techniques/T1569/002/
tags:
  - attack.execution
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1569.002
  - attack.t1543.003
logsource:
  product: windows
  service: system
detection:
  selection:
    EventID: 7045  # Service was installed
  suspicious_path:
    ServiceFileName|contains:
      - 'powershell'
      - 'cmd.exe'
      - 'wscript'
      - 'cscript'
      - 'mshta'
      - 'rundll32'
      - 'regsvr32'
  user_temp:
    ServiceFileName|contains:
      - '\AppData\'
      - '\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
  suspicious_service_name:
    ServiceName|contains:
      - 'update'
      - 'svchost'
      - 'windows'
      - 'system'
      - 'service'
  condition: selection and (suspicious_path or user_temp or suspicious_service_name)
falsepositives:
  - 合法软件安装
  - 企业服务部署
level: high

---

title: Service Binary Path Modified to Suspicious Value
id: e5f6a7b8-1569-002-002
