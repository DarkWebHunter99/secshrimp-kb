# ============================================================
# 8. 综合场景 — 完整 LOTL 攻击链检测
# ============================================================
# 检测从初始访问到横向移动的完整 LOTL 攻击链

title: LOTL Attack Chain - Multiple LOLBIN Execution in Short Timeframe
id: e5f6a7b8-lotl-chain-001
status: experimental
description: |
  检测短时间内连续使用多个系统工具（LOLBIN），可能为 LOTL 攻击链。
  攻击者通常在短时间内连续使用 certutil(bitsadmin)下载→mshta执行→powershell横向移动。
author: CodeShrimp
date: 2026/05/11
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.lateral_movement
  - attack.t1059.001
  - attack.t1218
  - attack.t1047
logsource:
  product: windows
  category: process_creation
detection:
  selection_lolbin:
    Image|endswith:
      - '\certutil.exe'
      - '\bitsadmin.exe'
      - '\mshta.exe'
      - '\wmic.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\msiexec.exe'
      - '\installutil.exe'
  selection_script:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
  selection_cmd:
    Image|endswith:
      - '\cmd.exe'
  condition: selection_lolbin or selection_script or selection_cmd
  timeframe: 5m
  condition2: count(Image) by SourceImage > 5
falsepositives:
  - 企业软件部署和更新
  - 系统管理自动化脚本
level: medium
