title: AD CS — 证书服务持久化
id: t1649-009
status: experimental
description: |
  检测通过 AD CS 实现的持久化机制。

  持久化方式:
  1. 创建具有低门槛的证书模板（允许所有域用户注册）
  2. 修改 CA 策略允许自动颁发
  3. 创建隐藏的管理员证书模板
  4. 修改现有模板的 EKU 允许所有用途

  检测特征:
  - 创建新的证书模板
  - 修改 CA 颁发策略
  - 添加新的注册机构
  - 修改模板的 EKU（Extended Key Usage）

references:
  - https://posts.specterops.io/certified-pre-owned-d95910965cd2
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.persistence
  - attack.credential_access
  - attack.t1649
logsource:
  category: process_creation
  product: windows
detection:
  selection_new_template:
    CommandLine|contains|all:
      - 'New-ADObject'
      - 'pKIEnrollmentService'
    CommandLine|contains:
      - 'CertificateTemplate'
  selection_ca_policy_change:
    CommandLine|contains|all:
      - 'certutil'
      - '-setreg'
    CommandLine|contains:
      - 'Policy'
      - 'Extension'
  selection_template_enrollment:
    CommandLine|contains|all:
      - 'certutil'
      - '-enrollment'
    CommandLine|contains:
      - 'ca'
      - 'register'
  selection_adcs_install:
    CommandLine|contains|all:
      - 'Install-AdcsCertificationAuthority'
      - '-Force'
  condition: selection_new_template or selection_ca_policy_change or selection_template_enrollment or selection_adcs_install
falsepositives:
  - 合法的 CA 安装和配置
  - 证书模板的常规管理
level: high
