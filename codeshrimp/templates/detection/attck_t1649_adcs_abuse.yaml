title: AD CS — 异常 PKINIT 认证
id: t1649-010
status: experimental
description: |
  检测异常的 PKINIT (Public Key Cryptography for Initial Authentication) 认证。

  PKINIT 异常特征:
  1. 非工作时间的 PKINIT 认证
  2. 从非标准源 IP 的 PKINIT
  3. 高频 PKINIT 认证请求
  4. 使用非标准证书的 PKINIT

  EventID 4768 字段分析:
  - PreAuthentType = 16 (PKINIT)
  - TicketEncryptionType = 0x10 (Diffie-Hellman)
  - 不同于普通密码认证 (PreAuthentType = 2)

references:
  - https://attack.mitre.org/techniques/T1649/
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.credential_access
  - attack.t1649
  - attack.t1649.003
logsource:
  product: windows
  service: security
detection:
  selection_pkinit:
    EventID: 4768
    PreAuthentType: 16
    TicketEncryptionType: '0x10'
  filter_biz_hours:
    # 工作时间内的合法 PKINIT（如 smart card）
    # 此处使用时间范围排除，实际部署需根据环境调整
    # TimeGenerated|timege: '08:00' and TimeGenerated|timele: '18:00'
    # 注意：Sigma 标准不支持 timege/timele，此为逻辑示例
  filter_service_accounts:
    TargetUserName|endswith: '$'
  filter_computer_accounts:
    TargetUserName|endswith: '$'
  condition: selection_pkinit and not filter_biz_hours and not filter_service_accounts and not filter_computer_accounts
falsepositives:
  - Smart card 登录
  - ADFS 服务认证
  - Azure AD Connect 同步
level: medium
