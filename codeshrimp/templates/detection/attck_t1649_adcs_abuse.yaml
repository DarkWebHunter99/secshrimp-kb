title: AD CS — CA 配置篡改
id: t1649-005
status: experimental
description: |
  检测对 CA（证书颁发机构）配置的可疑修改。

  攻击者修改 CA 配置以：
  1. 启用 CA 管理员证书映射（ESC6）
  2. 修改 CA 扩展（EKU 变更）
  3. 启用危险的 CA 策略
  4. 添加/删除证书模板

  检测特征:
  - certutil 修改 CA 配置
  - certsrv.msc 管理操作
  - CA 注册表修改

references:
  - https://posts.specterops.io/certified-pre-owned-d95910965cd2
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.credential_access
  - attack.t1649
logsource:
  category: process_creation
  product: windows
detection:
  selection_certutil_config:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-config'
      - '-setreg'
      - '-view'
      - '-ca'
  selection_ca_reg_modify:
    CommandLine|contains|all:
      - 'Set-ItemProperty'
      - 'HKLM:\SYSTEM\CurrentControlSet\Services\CertSvc\Configuration'
    CommandLine|contains:
      - 'ValidityPeriod'
      - 'Extension'
      - 'Policy'
      - 'AuditFilter'
  selection_ca_template_add:
    CommandLine|contains|all:
      - 'certutil'
      - '-addstore'
    CommandLine|contains|all:
      - 'Install-AdcsCertificationAuthority'
      - '-CAType'
  selection_certsrv_mgmt:
    Image|endswith: '\certsrv.msc'
    CommandLine|contains:
      - '/s'
  condition: selection_certutil_config or selection_ca_reg_modify or selection_ca_template_add or selection_certsrv_mgmt
falsepositives:
  - CA 管理员的合法配置变更
level: high
---
title: AD CS — 证书滥用横向移动
id: t1649-006
status: experimental
description: |
  检测使用已窃取或伪造的证书进行横向移动。

  横向移动方式:
  1. 使用窃取的证书进行 Kerberos PKINIT 认证
  2. 使用证书进行 TLS 客户端认证
  3. 使用证书进行 S/MIME 签名/加密
  4. 使用证书进行代码签名

  检测特征:
  - EventID 4768 (Kerberos TGT) 预认证类型 16 (PKINIT)
  - 证书指纹与已知恶意指纹匹配
  - 非标准时间的 PKINIT 认证
  - 从非域控制器发起的 PKINIT

references:
  - https://attack.mitre.org/techniques/T1649/
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.lateral_movement
  - attack.credential_access
  - attack.t1649
  - attack.t1649.003
logsource:
  product: windows
  service: security
detection:
  selection_pkinit_auth:
    EventID: 4768
    TicketEncryptionType: '0x10'  # PKINIT (Diffie-Hellman)
    TicketOptions: '0x40810000'
  selection_pkinit_no_preauth:
    EventID: 4768
    PreAuthentType: '16'  # PKINIT
    # 排除已知的合法 PKINIT 使用
  filter_dc_pkinit:
    # 域控制器的合法 PKINIT（如 ADFS）
    TargetUserName|endswith: '$'
  condition: (selection_pkinit_auth or selection_pkinit_no_preauth) and not filter_dc_pkinit
falsepositives:
  - ADFS 使用 PKINIT 进行认证
  - Azure AD Connect 同步账户
  - 合法的证书认证（如 smart card 登录）
level: medium
