title: AD CS — 证书模板 ACL 篡改
id: t1649-004
status: experimental
description: |
  检测对证书模板 ACL (DACL/SACL) 的可疑修改。

  攻击者通过修改证书模板的访问控制列表：
  1. 添加低权限用户/组的 Enroll 权限
  2. 移除 CA 管理员的管理权限
  3. 添加 All-Extended-Right 权限
  4. 修改 Owner 为攻击者可控账户

  检测特征:
  - dsacl 命令修改
  - Set-Acl 修改证书模板权限
  - ACL 审计日志（SACL）

references:
  - https://posts.specterops.io/certified-pre-owned-d95910965cd2
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.credential_access
  - attack.t1649
  - attack.t1649.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_dsacl:
    CommandLine|contains|all:
      - 'dsacls'
      - 'CN=Templates'
    CommandLine|contains:
      - 'ENROLL'
      - 'All-Extended-Right'
      - 'GenericAll'
      - 'WriteDacl'
      - 'WriteOwner'
  selection_set_acl:
    CommandLine|contains|all:
      - 'Set-Acl'
      - 'CertificateTemplate'
  selection_powerhell_acl:
    CommandLine|contains|all:
      - 'Add-ADPermission'
      - 'CertificateTemplate'
    CommandLine|contains|all:
      - 'Set-ADObject'
      - '-AclType'
  selection_dcsync_prep:
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'NTSecurityDescriptor'
  condition: selection_dsacl or selection_set_acl or selection_powerhell_acl or selection_dcsync_prep
falsepositives:
  - 合法的证书模板权限管理
level: high
