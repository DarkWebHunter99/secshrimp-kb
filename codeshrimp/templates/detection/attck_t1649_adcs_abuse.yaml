title: AD CS — 多重 ESC 技术关联检测
id: t1649-012
status: experimental
description: |
  检测 AD CS 攻击链中的多重 ESC (Escalation of Certificate Services) 技术关联。

  ESC 技术编号:
  - ESC1: 证书模板提权（ENROLLEE_SUPPLIES_SUBJECT）
  - ESC2: Any Purpose 证书滥用
  - ESC3: Agent Certificate 注册
  - ESC4: 证书模板 ACL 篡改
  - ESC5: 域控制器证书滥用
  - ESC6: CA 管理员证书映射
  - ESC7: CA 权限滥用
  - ESC8: HTTP Web Enrollment 漏洞

  检测逻辑: 在时间窗口内检测到 2+ 种不同 ESC 技术的指标组合。

references:
  - https://posts.specterops.io/certified-pre-owned-d95910965cd2
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.credential_access
  - attack.privilege_escalation
  - attack.t1649
logsource:
  category: process_creation
  product: windows
detection:
  selection_esc1:
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'msPKI-Certificate-Name-Flag'
  selection_esc2:
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'pKIExtendedKeyUsage'
    CommandLine|contains:
      - 'Any Purpose'
  selection_esc3:
    Image|endswith:
      - '\certify.exe'
      - '\certipy.exe'
    CommandLine|contains:
      - 'enroll'
      - 'request'
  selection_esc4:
    CommandLine|contains|all:
      - 'dsacls'
      - 'CN=Templates'
    CommandLine|contains:
      - 'ENROLL'
  selection_esc5:
    CommandLine|contains|all:
      - 'certutil'
      - '-config'
      - '-setreg'
  selection_esc6:
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'msPKI-Certificate-Name-Flag'
    CommandLine|contains:
      - 'ENROLLEE_SUPPLIES_SUBJECT'
  selection_esc7:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - 'admin'
      - 'manage'
  selection_esc8:
    CommandLine|contains|all:
      - 'certsrv'
      - 'web'
      - 'enroll'
  condition: 2 of selection_esc*
falsepositives:
  - 合法的 AD CS 配置管理（需要管理员权限）
level: critical
