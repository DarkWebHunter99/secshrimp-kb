# =============================================================================
# MITRE ATT&CK T1649 — AD CS (Active Directory Certificate Services) Abuse
# =============================================================================
# AD CS 是 Windows PKI 基础设施的核心组件。攻击者滥用 AD CS 可实现：
#   - 证书模板提权（ESC1-ESC8）
#   - 恶意证书请求（影子凭据）
#   - 证书服务持久化
#   - 证书滥用横向移动
#
# 本文件包含 12 条 Sigma 检测规则，覆盖：
#   - 证书模板枚举与修改
#   - 恶意证书请求
#   - 证书服务配置篡改
#   - 证书滥用横向移动
#   - ADCS 持久化
#
# MITRE ATT&CK: T1649 — Steal or Forge Authentication Certificates
# 子技术: T1649.001 (Certificate Template Modification)
#         T1649.002 (Certificate Enrollment)
#         T1649.003 (Certificate Abuse)
#
# 适用平台: Windows (Active Directory)
# 日志源: Security, Directory Service, ADCS Admin, Certificate Services
# 推荐 SIEM: Splunk / Elastic / Microsoft Sentinel / QRadar
#
# SID 范围: t1649-001 ~ t1649-012
# 版本: 1.0
# 作者: 代码虾 (CodeShrimp)
# 创建日期: 2026-05-14
# =============================================================================

---
title: AD CS — 证书模板枚举 (Certify/Certipy)
id: t1649-001
status: experimental
description: |
  检测 Certify 或 Certipy 工具的证书模板枚举行为。
  攻击者使用这些工具枚举 AD CS 配置，寻找可利用的证书模板（如 ESC1）。
  Certify 是 C# 编写的 .NET 工具，Certipy 是 Python 重写版。

  典型命令行:
    certify.exe enumerate
    certipy.exe find -u user@domain.com -p password
    certify.exe cas
references:
  - https://posts.specterops.io/certified-pre-owned-d95910965cd2
  - https://github.com/GhostPack/Certify
  - https://github.com/ly4k/Certipy
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.credential_access
  - attack.t1649
  - attack.t1649.001
  - attack.t1649.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_certify:
    - Image|endswith:
        - '\certify.exe'
        - '\Certify.exe'
    - CommandLine|contains:
        - 'enumerate'
        - 'cas'
        - '模板'
        - 'template'
        - 'vulnerable'
  selection_certipy:
    - Image|endswith:
        - '\certipy.exe'
        - '\Certipy.exe'
    - CommandLine|contains:
        - 'find'
        - 'ca'
        - 'template'
        - 'vulnerable'
  selection_adcs_enum:
    - CommandLine|contains|all:
        - 'certify'
        - 'enumerate'
    - CommandLine|contains|all:
        - 'certipy'
        - 'find'
    - CommandLine|contains|all:
        - 'Get-CertificateTemplate'
        - 'Get-Certificate'
  condition: selection_certify or selection_certipy or selection_adcs_enum
falsepositives:
  - 合法的 AD CS 管理脚本
  - IT 管理员使用 Certify 进行安全审计
level: medium
---
title: AD CS — 证书模板修改 (ESC1 提权)
id: t1649-002
status: experimental
description: |
  检测对 AD CS 证书模板的可疑修改操作，特别是 ESC1 提权攻击。

  ESC1 攻击原理:
  1. 修改证书模板的 msPKI-Certificate-Name-Flag 为 ENROLLEE_SUPPLIES_SUBJECT
  2. 移除需要 CA 管理员批准的限制
  3. 将模板的 authorized_signatures 设为 0
  4. 请求证书时指定 UPN 为其他用户（如 Domain Admin）

  检测特征:
  - ADSI 修改证书模板对象属性
  - Certify/Certipy 修改模板配置
  - 直接 LDAP 修改 msPKI-* 属性

  攻击者需要具有证书模板的 WriteProperty 或 WriteDACL 权限。

references:
  - https://posts.specterops.io/certified-pre-owned-d95910965cd2
  - https://attack.mitre.org/techniques/T1649/001/
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.credential_access
  - attack.privilege_escalation
  - attack.t1649
  - attack.t1649.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_adsi_modify:
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'msPKI-Certificate-Name-Flag'
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'authorized-signatures'
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'msPKI-Enrollment-Flag'
  selection_certify_modify:
    Image|endswith:
      - '\certify.exe'
      - '\Certify.exe'
    CommandLine|contains:
      - 'update'
      - 'modify'
      - 'template'
  selection_certipy_modify:
    Image|endswith:
      - '\certipy.exe'
      - '\Certipy.exe'
    CommandLine|contains:
      - 'template'
      - 'modify'
  selection_ldap_modify:
    CommandLine|contains|all:
      - 'ldapmodify'
      - 'msPKI-'
    CommandLine|contains|all:
      - 'Set-ItemProperty'
      - 'HKLM:\SYSTEM\CurrentControlSet\Services\CertSvc'
  condition: selection_adsi_modify or selection_certify_modify or selection_certipy_modify or selection_ldap_modify
falsepositives:
  - 合法的证书模板管理（需要 AD CS 管理员权限）
level: high
---
title: AD CS — 恶意证书请求 (影子凭据)
id: t1649-003
status: experimental
description: |
  检测使用影子凭据（Shadow Credentials）技术请求证书的行为。

  影子凭据攻击原理:
  1. 修改目标账户的 msDS-KeyCredentialLink 属性，添加攻击者控制的密钥
  2. 使用该密钥请求 Kerberos PKINIT 票据
  3. 从 PKINIT 响应中获取 NTLM 哈希
  4. 使用获取的哈希进行 Pass-the-Hash 或其他认证

  检测特征:
  - Set-ADObject 修改 msDS-KeyCredentialLink
  - Whisker 工具执行
  - PKINIT 认证请求（EventID 4768，预认证类型 16）

references:
  - https://attack.mitre.org/techniques/T1556/001/
  - https://github.com/eladshamir/Whisker
author: CodeShrimp
date: 2026/05/14
tags:
  - attack.credential_access
  - attack.t1649
  - attack.t1556
  - attack.t1556.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_whisker:
    - Image|endswith: '\Whisker.exe'
    - CommandLine|contains:
        - 'add'
        - 'target'
        - 'Whisker'
  selection_shadow_creds:
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'msDS-KeyCredentialLink'
    CommandLine|contains|all:
      - 'Set-ADObject'
      - 'KeyCredentialLink'
  selection_certipy_shadow:
    Image|endswith: '\certipy.exe'
    CommandLine|contains:
      - 'shadow'
      - 'credentials'
  selection_pkinit_suspicious:
    EventID: 4768
    TicketEncryptionType: '0x10'  # PKINIT
    TicketOptions: '0x40810000'
    # 可疑的 UPN 不在已知用户列表中
  condition: selection_whisker or selection_shadow_creds or selection_certipy_shadow or selection_pkinit_suspicious
falsepositives:
  - 合法的 KeyCredential 管理（AAD Connect 同步）
level: critical
