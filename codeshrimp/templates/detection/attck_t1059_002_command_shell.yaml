# ============================================================
# MITRE ATT&CK T1059.002 — Windows Command Shell 滥用检测
# ============================================================
# Technique: T1059.002 - Command and Scripting Interpreter: Windows Command Shell
# Platform: Windows
# Tactics: Execution
# Covers: cmd.exe 可疑执行、编码命令、下载执行、反弹 Shell、环境变量操控
# ============================================================

title: Windows Command Shell Abuse Detection Suite
id: b7e8f9a0-1059-002-000
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测 Windows Command Shell (cmd.exe) 的滥用行为。
  cmd.exe 是最常见的攻击执行入口之一，覆盖持久化、
  提权、横向移动和数据外泄全攻击链。

---

# ============================================================
# 1. 编码命令执行 — 绕过 AMSI/日志
# ============================================================
# 攻击者使用 PowerShell 的 -enc 或 cmd.exe 的编码执行绕过检测

title: Encoded Command Execution via CMD
id: b7e8f9a0-1059-002-001-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测通过 cmd.exe 执行编码命令的行为。攻击者使用 certutil -decode
  或 PowerShell -enc 绕过 AMSI 和命令行日志记录。
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1059.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_encoded:
    CommandLine|contains:
      # certutil 解码
      - 'certutil -decode'
      - 'certutil /decode'
      - 'certutil -urlcache'
      # PowerShell 编码
      - 'powershell -enc'
      - 'powershell -EncodedCommand'
      - 'powershell -e '
      # base64 执行
      - 'FromBase64String'
      - '[Convert]::FromBase64'
      # MSHTA 编码
      - 'mshta vbscript:Execute'
  condition: selection_cmd and selection_encoded
falsepositives:
  - 系统更新脚本
  - 合法的编码文件传输
level: high
---

# ============================================================
# 2. 下载执行 Cradle — 远程代码执行
# ============================================================
# 攻击者通过 cmd.exe 下载并执行远程恶意文件

title: Download and Execute via CMD
id: b7e8f9a0-1059-002-001-002
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测通过 cmd.exe 下载并执行远程文件的行为。
  常见手法：certutil -urlcache、bitsadmin /transfer、
  PowerShell Invoke-WebRequest、curl/wget 下载后执行。
tags:
  - attack.execution
  - attack.t1105
  - attack.t1059.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_download:
    CommandLine|contains:
      # certutil 下载
      - 'certutil -urlcache -split -f'
      - 'certutil /urlcache'
      # bitsadmin 下载
      - 'bitsadmin /transfer'
      - 'bitsadmin /create'
      - 'bitsadmin /addfile'
      # PowerShell 下载
      - 'Invoke-WebRequest'
      - 'Invoke-Expression'
      - 'IEX('
      - 'Net.WebClient'
      - 'DownloadString'
      - 'DownloadFile'
      - 'Start-BitsTransfer'
      # 原生工具
      - 'curl -o'
      - 'curl -O'
      - 'wget'
      - 'certutil -f'
  selection_pipe:
    CommandLine|contains:
      - '| powershell'
      - '| cmd'
      - '&& powershell'
      - '&& cmd'
  condition: selection_cmd and selection_download and selection_pipe
falsepositives:
  - 合法的软件部署脚本
  - 系统更新下载
level: high
---

# ============================================================
# 3. 反弹 Shell — 交互式远程控制
# ============================================================
# 攻击者通过 cmd.exe 建立反弹 Shell 连接

title: Reverse Shell via CMD
id: b7e8f9a0-1059-002-001-003
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测通过 cmd.exe 建立的反弹 Shell 连接。
  覆盖 PowerShell 反弹、ncat/netcat 反弹、
  Bash on Windows (WSL) 反弹等场景。
tags:
  - attack.execution
  - attack.t1059.002
  - attack.command_and_control
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_reverse:
    CommandLine|contains:
      # PowerShell 反弹
      - 'powershell -nop -c'
      - 'powershell -w hidden -c'
      - 'powershell IEX'
      # nc/ncat 反弹
      - 'ncat -e'
      - 'nc -e'
      - 'ncat '
      - 'netcat '
      # 反弹 Shell 常见模式
      - '/dev/tcp/'
      - '7>&1'
      - '5>&1'
      - 'TCPClient'
      - 'SmtpClient'
      # WSL 反弹
      - 'wsl bash -c'
      - 'wsl -e bash'
  selection_network:
    CommandLine|contains:
      - '>'
      - '1>'
      - '2>&1'
      - '|'
  condition: selection_cmd and selection_reverse
falsepositives:
  - 合法的远程管理工具
  - 网络调试脚本
level: critical
---

# ============================================================
# 4. 环境变量操控 — 逃逸/提权
# ============================================================
# 攻击者通过 cmd.exe 操控环境变量实现路径逃逸或提权

title: Suspicious Environment Variable Manipulation
id: b7e8f9a0-1059-002-001-004
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测通过 cmd.exe 操控环境变量的可疑行为。
  攻击者可能修改 PATH、PSModulePath、TEMP 等变量
  实现 DLL 劫持、路径逃逸或执行恶意代码。
tags:
  - attack.execution
  - attack.t1574
  - attack.t1059.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_env:
    CommandLine|contains:
      # PATH 劫持
      - 'set PATH='
      - 'set PATH='
      - 'PATH='
      # PSModulePath 操控
      - 'set PSModulePath='
      - 'PSModulePath='
      # TEMP 目录操控
      - 'set TEMP='
      - 'set TMP='
      # 可疑环境变量
      - 'set PROMPT='
      - 'PROMPT='
      # DLL 搜索路径
      - 'set PATH=%TEMP%'
      - 'PATH=%TEMP%'
  selection_suspicious:
    CommandLine|contains:
      - '..'
      - '%TEMP%'
      - '%APPDATA%'
      - '\\Users\\Public\\'
      - '\\ProgramData\\'
  condition: selection_cmd and selection_env and selection_suspicious
falsepositives:
  - 开发环境配置脚本
  - 合法的临时目录设置
level: medium
---

# ============================================================
# 5. 服务账户/计划任务 cmd.exe 执行
# ============================================================
# 检测非交互式 session 中的 cmd.exe 执行

title: CMD Execution from Service Account
id: b7e8f9a0-1059-002-001-005
status: experimental
author: CodeShrimp
date: 2026/05-12
description: |
  检测从服务账户或计划任务触发的 cmd.exe 执行。
  合法服务很少直接调用 cmd.exe，这通常表示
  攻击者利用服务或计划任务执行命令。
tags:
  - attack.execution
  - attack.t1059.002
  - attack.t1569
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_context:
    # 服务账户上下文
    User|contains:
      - 'NT AUTHORITY\\SYSTEM'
      - 'NT AUTHORITY\\NETWORK SERVICE'
      - 'NT AUTHORITY\\LOCAL SERVICE'
  selection_parent:
    # 父进程为非交互式
    ParentImage|endswith:
      - '\services.exe'
      - '\svchost.exe'
      - '\taskhostw.exe'
      - '\svchost.exe'
  condition: selection_cmd and selection_context and selection_parent
falsepositives:
  - Windows 内部服务调用
  - 合法的系统维护脚本
level: medium
---

# ============================================================
# 6. cmd.exe 链式执行 — 多层嵌套
# ============================================================
# 攻击者使用 cmd.exe 多层嵌套执行绕过检测

title: Nested CMD Execution
id: b7e8f9a0-1059-002-001-006
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测 cmd.exe 的多层嵌套执行。
  攻击者使用 cmd /c "cmd /c ..." 多层嵌套
  混淆命令内容，绕过简单字符串匹配。
tags:
  - attack.execution
  - attack.t1059.002
  - attack.defense_evasion
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_nested:
    CommandLine|contains:
      - 'cmd /c "cmd'
      - 'cmd.exe /c "cmd'
      - 'cmd.exe /c "powershell'
      - 'cmd /c "powershell'
      - 'cmd /c "wscript'
      - 'cmd /c "cscript'
      - 'cmd.exe /c "mshta'
  selection_obfuscated:
    CommandLine|contains:
      - '%%'
      - '^%'
      - '%22'
      - '""'
  condition: selection_cmd and (selection_nested or selection_obfuscated)
falsepositives:
  - 复杂的系统管理脚本
level: medium
---

# ============================================================
# 7. cmd.exe 执行 LOLBAS 二进制
# ============================================================
# 检测通过 cmd.exe 调用 LOLBAS 二进制

title: CMD Execution of LOLBins
id: b7e8f9a0-1059-002-001-007
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测通过 cmd.exe 调用 Living off the Land Binaries (LOLBins)。
  攻击者使用系统自带二进制执行恶意操作。
tags:
  - attack.execution
  - attack.t1059.002
  - attack.t1218
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_lolbas:
    CommandLine|contains:
      # 下载执行
      - 'certutil -urlcache'
      - 'bitsadmin /transfer'
      - 'mshta http'
      - 'mshta vbscript'
      # 文件操作
      - 'forfiles /p'
      - 'replace.exe'
      # 进程注入
      - 'regsvr32 /s /n /u'
      - 'rundll32 javascript'
      - 'rundll32 comsvcs'
      # 代理执行
      - 'installutil.exe'
      - 'msbuild.exe'
      - 'regasm.exe'
      - 'regsvcs.exe'
  condition: selection_cmd and selection_lolbas
falsepositives:
  - 合法的系统管理操作
level: high
---

# ============================================================
# 8. 可疑 CMD 启动 — 异常父进程
# ============================================================
# 检测由异常父进程启动的 cmd.exe

title: CMD Launched by Suspicious Parent Process
id: b7e8f9a0-1059-002-001-008
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测由可疑父进程启动的 cmd.exe。
  正常情况下 cmd.exe 由 explorer.exe、powershell.exe 或
  其他合法进程启动。异常父进程可能表示代码执行成功。
tags:
  - attack.execution
  - attack.t1059.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_suspicious_parent:
    ParentImage|endswith:
      # Office 文档 — 宏执行
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\msaccess.exe'
      - '\mspub.exe'
      - '\visio.exe'
      # 浏览器 — 漏洞利用
      - '\chrome.exe'
      - '\firefox.exe'
      - '\msedge.exe'
      - '\iexplore.exe'
      # 媒体文件 — 漏洞利用
      - '\wmplayer.exe'
      - '\vlc.exe'
      - '\mspaint.exe'
      # 压缩文件 — 恶意载荷
      - '\winrar.exe'
      - '\7z.exe'
      - '\7za.exe'
      # 脚本宿主 — 间接执行
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      # 系统工具 — 代理执行
      - '\certutil.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\installutil.exe'
  condition: selection_cmd and selection_suspicious_parent
falsepositives:
  - Office 宏合法自动化
  - 浏览器下载后手动执行
level: high
---

# ============================================================
# 9. cmd.exe 网络连接 — 数据外泄/C2
# ============================================================
# 检测 cmd.exe 产生的网络连接

title: CMD Network Connection
id: b7e8f9a0-1059-002-002-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测 cmd.exe 产生的网络连接。
  合法 cmd.exe 很少直接发起网络连接，
  通常表示使用了 PowerShell、curl、wget 等工具。
tags:
  - attack.command_and_control
  - attack.exfiltration
  - attack.t1059.002
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    Image|endswith: '\cmd.exe'
  filter合法:
    DestinationPort:
      - 80
      - 443
      - 53
  condition: selection and not filter合法
falsepositives:
  - 合法的网络管理脚本
level: medium
---

# ============================================================
# 10. 攻击链关联 — 多步骤检测
# ============================================================
# 关联多个可疑行为形成攻击链告警

title: CMD Abuse Attack Chain
id: b7e8f9a0-1059-002-003-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  关联多个 cmd.exe 可疑行为，识别完整攻击链。
  当短时间内触发多个规则时，生成高置信度告警。
tags:
  - attack.execution
  - attack.t1059.002
  - attack.chain
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\cmd.exe'
  condition: selection
  timeframe: 30m
  threshold:
    type: threshold
    track: by_host
    count: 3
    seconds: 1800
falsepositives: []
level: critical
