title: Lateral Movement via PsExec with Valid Account
id: d4e5f6a7-1078-000-006
status: stable
description: |
  Detects PsExec usage with valid domain credentials for lateral movement,
  a common technique after initial compromise.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://attack.mitre.org/techniques/T1570/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.lateral_movement
  - attack.t1021.002
logsource:
  product: windows
  service: security
detection:
  selection_psexec_service:
    EventID: 7045
    ServiceFileName|contains:
      - 'PSEXESVC'
      - 'psexesvc'
  selection_psexec_process:
    EventID: 1
    Image|endswith: '\PSEXESVC.exe'
  selection_remote_scheduled_task:
    EventID: 4698
    TaskContent|contains:
      - 'PSEXESVC'
  condition: selection_psexec_service or selection_psexec_process or selection_remote_scheduled_task
falsepositives:
  - Legitimate remote administration using PsExec
  - SCCM and other management tools
level: high
