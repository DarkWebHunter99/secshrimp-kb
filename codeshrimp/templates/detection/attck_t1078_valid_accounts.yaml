title: Off-Hours Logon for Service Account
id: d4e5f6a7-1078-000-002
status: stable
description: |
  Detects logons by service accounts outside normal business hours,
  which may indicate compromised service account credentials.
references:
  - https://attack.mitre.org/techniques/T1078/002/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1078.002
logsource:
  product: windows
  service: security
detection:
  selection_logon:
    EventID: 4624
    LogonType:
      - 2    # Interactive
      - 3    # Network
      - 10   # RemoteInteractive
  selection_service_account:
    TargetUserName|endswith:
      - 'svc_'
      - '_svc'
      - 'service'
      - 'svcaccount'
  selection_off_hours:
    # Adjust these filters based on your organization's business hours
    # Example: flag logons between 22:00 and 06:00 local time
    # Use WorkstationName to filter known admin workstations
    WorkstationName|contains:
      - 'WORKSTATION'
      - 'ADMIN'
  condition: selection_logon and selection_service_account and selection_off_hours
falsepositives:
  - Legitimate off-hours maintenance
  - Scheduled tasks running as service account
level: high

