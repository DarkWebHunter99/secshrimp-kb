title: Suspicious Use of Built-in Admin Account
id: d4e5f6a7-1078-000-004
status: stable
description: |
  Detects suspicious usage of built-in Administrator or DefaultAccount,
  which may indicate lateral movement using default credentials.
references:
  - https://attack.mitre.org/techniques/T1078/001/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.initial_access
  - attack.t1078.001
logsource:
  product: windows
  service: security
detection:
  selection_admin_logon:
    EventID: 4624
    TargetUserName:
      - 'Administrator'
      - 'DefaultAccount'
      - 'Guest'
  selection_remote_access:
    LogonType:
      - 3    # Network
      - 10   # RemoteInteractive
  selection_rdp:
    LogonType: 10
    LogonProcessName: 'User32'
  condition: selection_admin_logon and (selection_remote_access or selection_rdp)
falsepositives:
  - Legitimate administrator RDP access
  - IT helpdesk using admin account for remote support
level: high

---

title: Multiple Failed Logons Followed by Success (Credential Stuffing)
id: d4e5f6a7-1078-000-005
status: stable
description: |
  Detects patterns of multiple failed logon attempts followed by a successful
  logon, indicating potential brute force or credential stuffing attacks.
references:
  - https://attack.mitre.org/techniques/T1110/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1110
logsource:
  product: windows
  service: security
detection:
  selection_failed_logon:
    EventID: 4625
    LogonType:
      - 2
      - 3
      - 10
  condition: selection_failed_logon
  timeframe: 5m
  count(TargetUserName) by TargetUserName > 5
falsepositives:
  - User forgetting password
  - Account lockout conditions
  - Service account password rotation
level: medium

