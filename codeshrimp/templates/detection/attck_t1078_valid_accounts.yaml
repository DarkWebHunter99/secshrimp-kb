# ============================================================
# MITRE ATT&CK T1078 — Valid Accounts Detection
# ============================================================
# Technique: T1078 - Valid Accounts
# Platform: Windows/Linux/macOS
# Tactics: Initial Access, Persistence, Privilege Escalation, Defense Evasion
# Covers: T1078.001 (Default Accounts), T1078.002 (Domain Accounts),
#         T1078.003 (Local Accounts), T1078.004 (Cloud Accounts)
# ============================================================

title: Anomalous Logon from Unusual Source IP
id: d4e5f6a7-1078-000-001
status: stable
description: |
  Detects successful logons from IP addresses not seen in the historical baseline
  for the user account, indicating potential credential theft or compromised account.
references:
  - https://attack.mitre.org/techniques/T1078/
  - https://attack.mitre.org/techniques/T1078/002/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.initial_access
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1078
logsource:
  product: windows
  service: security
detection:
  selection_logon_success:
    EventID: 4624
    LogonType:
      - 2    # Interactive
      - 3    # Network
      - 7    # Unlock
      - 10   # RemoteInteractive (RDP)
      - 11   # CachedInteractive
  selection_anomalous_source:
   IpAddress|startswith:
      - '10.'
      - '172.16.'
      - '172.17.'
      - '172.18.'
      - '172.19.'
      - '172.20.'
      - '172.21.'
      - '172.22.'
      - '172.23.'
      - '172.24.'
      - '172.25.'
      - '172.26.'
      - '172.27.'
      - '172.28.'
      - '172.29.'
      - '172.30.'
      - '172.31.'
      - '192.168.'
  filter_system_accounts:
    TargetUserName|endswith:
      - '$'
      - 'SYSTEM'
  filter_computer_accounts:
    TargetUserName|endswith:
      - '$'
  condition: selection_logon_success and selection_anomalous_source and not filter_system_accounts
falsepositives:
  - New employee accessing from different network segment
  - VPN user with dynamic IP
  - Remote worker from home network
level: medium

