title: Pass-the-Hash / Pass-the-Ticket Indicators
id: d4e5f6a7-1078-000-003
status: stable
description: |
  Detects indicators of Pass-the-Hash or Pass-the-Ticket attacks,
  where stolen credentials are used without knowledge of the password.
references:
  - https://attack.mitre.org/techniques/T1550/002/
  - https://attack.mitre.org/techniques/T1550/003/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.lateral_movement
  - attack.t1550.002
logsource:
  product: windows
  service: security
detection:
  selection_logon_type3:
    EventID: 4624
    LogonType: 3
    LogonProcessName: 'NtLmSsp'
  selection_anonymously_logged_on:
    EventID: 4624
    LogonType: 3
    TargetUserName: 'ANONYMOUS LOGON'
  selection_logon_no_password:
    EventID: 4624
    LogonType: 3
    KeyLength: 0
  selection_kerberos_ticket:
    EventID: 4768
    TicketEncryptionType: '0x17'  # RC4 encryption (weak, suspicious)
    TicketOptions: '0x40810010'
  selection_kerberos_service:
    EventID: 4769
    TicketEncryptionType: '0x17'  # RC4
    ServiceName: 'krbtgt'
  condition: selection_logon_type3 or selection_anonymously_logged_on or selection_logon_no_password or selection_kerberos_ticket or selection_kerberos_service
falsepositives:
  - Legacy applications using NTLM authentication
  - Kerberos RC4 encryption in mixed environments
level: high

