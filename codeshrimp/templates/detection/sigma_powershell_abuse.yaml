title: PowerShell WMI Execution
id: b2c3d4e5-1059-001-004
status: stable
description: |
  Detects PowerShell executing commands via WMI (Win32_Process Create),
  commonly used for lateral movement and remote code execution.
references:
  - https://attack.mitre.org/techniques/T1047/
  - https://attack.mitre.org/techniques/T1059/001/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.execution
  - attack.t1047
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell_wmi:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Invoke-WmiMethod'
      - 'Invoke-CimMethod'
      - 'Get-WmiObject'
      - 'wmic '
      - 'Win32_Process'
      - 'Win32_ProcessCreate'
  selection_wmi_powershell:
    Image|endswith:
      - '\wmiprvse.exe'
    CommandLine|contains:
      - 'powershell'
      - 'pwsh'
  condition: selection_powershell_wmi or selection_wmi_powershell
falsepositives:
  - Legitimate remote administration
  - SCCM and other management tools
level: high

