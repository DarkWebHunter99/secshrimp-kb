title: PowerShell Download Cradle Detection
id: b2c3d4e5-1059-001-002
status: stable
description: |
  Detects PowerShell commands that download and execute content from remote URLs,
  a common technique for payload delivery and fileless malware execution.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://blog.menasec.net/2019/03/threat-hunting-25-powershell-and-batch.html
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_download_iex:
    CommandLine|contains:
      - 'IEX ('
      - 'IEX(New-Object'
      - 'Invoke-Expression'
      - 'iex $'
  selection_download WebClient:
    CommandLine|contains:
      - 'Net.WebClient'
      - 'DownloadString'
      - 'DownloadFile'
      - 'DownloadData'
      - 'Invoke-WebRequest'
      - 'wget '
      - 'curl '
  selection_download_start:
    CommandLine|contains:
      - 'Start-BitsTransfer'
      - 'Invoke-WebRequest -Uri'
      - 'iwr '
      - 'irm '
      - 'Start-Process'
  condition: selection_powershell and (selection_download_iex or selection_download WebClient or selection_download_start)
falsepositives:
  - Legitimate software updates using PowerShell
  - IT automation scripts
level: high

