title: PowerShell Script Block Logging Disabled
id: b2c3d4e5-1059-001-006
status: stable
description: |
  Detects attempts to disable PowerShell script block logging,
  which may indicate defense evasion.
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_disable_logging:
    CommandLine|contains:
      - 'Set-ItemProperty'
      - 'Remove-ItemProperty'
    CommandLine|contains|all:
      - 'ScriptBlockLogging'
      - 'EnableScriptBlockLogging'
      - '0'
  selection_transcription_disable:
    CommandLine|contains:
      - 'EnableTranscripting'
  condition: selection_powershell and (selection_disable_logging or selection_transcription_disable)
falsepositives:
  - IT administrators configuring logging policy
level: medium
