title: PowerShell Suspicious Clipboard and Input Monitoring
id: b2c3d4e5-1059-001-005
status: stable
description: |
  Detects PowerShell accessing clipboard or keyboard input, which may indicate
  credential harvesting or data collection.
references:
  - https://attack.mitre.org/techniques/T1115/
  - https://attack.mitre.org/techniques/T1056/001/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.collection
  - attack.credential_access
  - attack.t1115
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_clipboard:
    CommandLine|contains:
      - 'Get-Clipboard'
      - 'Set-Clipboard'
      - 'System.Windows.Forms.Clipboard'
      - 'TextCopy'
  selection_keylogger:
    CommandLine|contains:
      - 'GetAsyncKeyState'
      - 'SetWindowsHookEx'
      - 'RegisterHotKey'
