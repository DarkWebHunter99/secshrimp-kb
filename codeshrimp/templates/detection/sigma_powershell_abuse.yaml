title: PowerShell AMSI Bypass Attempt
id: b2c3d4e5-1059-001-003
status: stable
description: |
  Detects attempts to bypass Antimalware Scan Interface (AMSI),
  a defense evasion technique commonly used before payload execution.
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://amsi.fail/
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_amsi_bypass:
    CommandLine|contains:
      - 'AmsiUtils'
      - 'amsiInitFailed'
      - 'AmsiScanBuffer'
      - 'AmsiOpenSession'
      - '[Ref].Assembly'
      - 'System.Management.Automation.AmsiUtils'
      - 'amsi.dll'
  selection_amsi_disable:
    CommandLine|contains:
      - 'Set-MpPreference -DisableRealtimeMonitoring'
      - 'Set-MpPreference -DisableBehaviorMonitoring'
      - 'Set-MpPreference -DisableIOAVProtection'
  condition: selection_powershell and (selection_amsi_bypass or selection_amsi_disable)
falsepositives:
  - Security research and testing (in lab environments)
  - Legitimate AMSI troubleshooting
level: critical

