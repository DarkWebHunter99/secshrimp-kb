# ============================================================
# MITRE ATT&CK T1059.001 — PowerShell 异常执行检测
# ============================================================
# Technique: T1059.001 - Command and Scripting Interpreter: PowerShell
# Platform: Windows
# Tactics: Execution
# Sub-techniques covered: encoded commands, bypass, download cradle, AMSI bypass, WMI execution
# ============================================================

title: Suspicious PowerShell Encoded Command Execution
id: b2c3d4e5-1059-001-001
status: stable
description: |
  Detects PowerShell execution with encoded commands (-Enc/-EncodedCommand),
  commonly used in attack chains to obfuscate malicious payloads.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://www.elastic.co/guide/en/security/current/powershell-encoded-command.html
author: CodeShrimp (auto-generated)
date: 2026/05/11
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_encoded:
    CommandLine|contains:
      - '-enc '
      - '-EncodedCommand '
      - '-e '
      - '-ec '
  filter_legitimate:
    ParentImage|endswith:
      - '\sccm\ccmexec.exe'
      - '\sccm\CmRcService.exe'
      - '\chocolatey\choco.exe'
      - '\ansible\ansible.exe'
  condition: selection_powershell and selection_encoded and not filter_legitimate
falsepositives:
  - SCCM and other legitimate management tools
  - Chocolatey package manager
  - Ansible automation
level: high

