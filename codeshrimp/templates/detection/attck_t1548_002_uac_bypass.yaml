title: T1548.002 - UAC Bypass via Registry Modification (Sysmon)
id: f8a1b2c3-1548-002-002
status: experimental
description: |
  Detects registry modifications to keys commonly abused for UAC bypass using Sysmon.
  Monitors HKCU and HKLM registry paths that attackers hijack to auto-elevate processes.
  MITRE ATT&CK: T1548.002
references:
  - https://attack.mitre.org/techniques/T1548/002/
  - https://docs.microsoft.com/en-us/windows/win32/sysmon/event-12-registry-event-object-create-deleted
author: 代码虾
date: 2026-05-14
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1548.002
logsource:
  product: windows
  category: registry_set
detection:
  selection_ms_settings:
    TargetObject|endswith: '\ms-settings\shell\open\command'
  selection_mscfile:
    TargetObject|endswith: '\mscfile\shell\open\command'
  selection_control_exe:
    TargetObject|contains: '\App Paths\control.exe'
  selection_batfile:
    TargetObject|endswith: '\batfile\shell\open\command'
  selection_cmdfile:
    TargetObject|endswith: '\cmdfile\shell\open\command'
  selection_exefile:
    TargetObject|endswith: '\exefile\shell\open\command'
  selection_classid:
    TargetObject|contains:
      - '\CLSID\{DFB65200-ADB5-11d0-99EF-00C04FC99CC6}\LocalServer32'
      - '\CLSID\{0A29FF9E-7F9C-4437-8B11-F424491E3933}\InprocServer32'
      - '\CLSID\{0A29FF9E-7F9C-4437-8B11-F424491E3931}\InprocServer32'
  condition: >
    selection_ms_settings or
    selection_mscfile or
    selection_control_exe or
    selection_batfile or
    selection_cmdfile or
    selection_exefile or
    selection_classid
falsepositives:
  - Software installation modifying shell associations
  - IT automation tools setting default program handlers
level: high

