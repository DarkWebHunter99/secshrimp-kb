date: 2026-05-14
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1548.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_eventvwr_high_integrity:
    Image|endswith: '\eventvwr.exe'
    IntegrityLevel: 'High'
  selection_eventvwr_nonstandard_parent:
    Image|endswith: '\eventvwr.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\explorer.exe'
  selection_eventvwr_child_cmd:
    ParentImage|endswith: '\eventvwr.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
  condition: >
    selection_eventvwr_high_integrity or
    selection_eventvwr_nonstandard_parent or
