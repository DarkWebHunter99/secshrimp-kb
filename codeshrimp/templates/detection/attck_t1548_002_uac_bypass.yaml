title: T1548.002 - UAC Bypass via fodhelper.exe with Suspicious Child
id: f8a1b2c3-1548-002-005
status: experimental
description: |
  Advanced detection of fodhelper.exe UAC bypass when spawning suspicious child processes.
  fodhelper.exe is a Windows binary that auto-elevates and checks ms-settings registry
  on launch. If an attacker sets the registry key, fodhelper.exe will execute the
  attacker's payload at high integrity without UAC prompt.
  MITRE ATT&CK: T1548.002
references:
  - https://attack.mitre.org/techniques/T1548/002/
  - https://enigma0x3.net/2017/01/05/uac-bypass-using-fodhelper-exe/
author: 代码虾
date: 2026-05-14
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1548.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_fodhelper_high_integrity:
    Image|endswith: '\fodhelper.exe'
    IntegrityLevel: 'High'
  selection_fodhelper_nonstandard_parent:
    Image|endswith: '\fodhelper.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\explorer.exe'
  selection_fodhelper_child_cmd:
    ParentImage|endswith: '\fodhelper.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
  condition: >
    selection_fodhelper_high_integrity or
    selection_fodhelper_nonstandard_parent or
    selection_fodhelper_child_cmd
falsepositives:
  - Rare cases where fodhelper.exe is legitimately launched from scripts
level: high

