title: T1548.002 - UAC Bypass via CMSTP Execution
id: f8a1b2c3-1548-002-003
status: experimental
description: |
  Detects abuse of CMSTP (Connection Manager Profile Installer) for UAC bypass.
  Attackers craft malicious .inf files that execute commands via CMSTP.exe auto-elevation.
  MITRE ATT&CK: T1548.002
references:
  - https://attack.mitre.org/techniques/T1548/002/
  - https://pentestlab.blog/2017/05/23/uac-bypass-cmstp/
  - https://github.com/nicene-nern/CMSTP-UAC-Bypass
author: 代码虾
date: 2026-05-14
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1548.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_cmstp:
    Image|endswith: '\cmstp.exe'
  selection_cmstp_inf:
    Image|endswith: '\cmstp.exe'
    CommandLine|contains:
      - '/s'
      - '/ni'
  selection_cmstp_child:
    ParentImage|endswith: '\cmstp.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  condition: selection_cmstp or selection_cmstp_inf or selection_cmstp_child
falsepositives:
  - Legitimate VPN or Connection Manager profile installation
level: high

---

title: T1548.002 - UAC Bypass via .NET ClickOnce Deployment
id: f8a1b2c3-1548-002-004
status: experimental
description: |
  Detects abuse of .NET ClickOnce deployment for UAC bypass.
  Attackers use dfsvc.exe (ClickOnce) to bypass UAC by deploying malicious applications.
  MITRE ATT&CK: T1548.002
references:
  - https://attack.mitre.org/techniques/T1548/002/
  - https://posts.specterops.io/clickonce-for-everything-489fd1c45749
author: 代码虾
date: 2026-05-14
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1548.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_dfsvc:
    Image|endswith: '\dfsvc.exe'
    CommandLine|contains:
      - '/dll'
      - '/noupdate'
      - '.application'
      - '.xbap'
  selection_dfsvc_child:
    ParentImage|endswith: '\dfsvc.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
  condition: selection_dfsvc or selection_dfsvc_child
falsepositives:
  - Legitimate .NET ClickOnce application deployment
level: medium

