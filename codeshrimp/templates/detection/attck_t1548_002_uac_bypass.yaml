title: T1548.002 - Bypass User Account Control (UAC Bypass Detection)
id: f8a1b2c3-1548-002-001
status: experimental
description: |
  Detects multiple UAC bypass techniques targeting Windows User Account Control.
  Covers 8 common bypass methods: Event Viewer hijack, Fodhelper/ComputerDefaults
  ms-settings hijack, SDCLT bypass, SilentCleanup abuse, CMSTPLUA COM interface,
  .NET Assembly loading from non-standard paths, and DLL hijacking via auto-elevating executables.
  MITRE ATT&CK: T1548.002 - Abuse Elevation Control Mechanism: Bypass User Account Control
references:
  - https://attack.mitre.org/techniques/T1548/002/
  - https://github.com/hfiref0x/UACME
  - https://pentestlab.blog/2017/03/20/uac-bypass-fodhelper/
  - https://enigma0x3.net/2017/01/05/uac-bypass-using-eventvwr-exe-and-registry-hijacking/
author: 代码虾
date: 2026-05-14
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1548.002
logsource:
  product: windows
  category: process_creation
detection:
  # === Technique 1: Event Viewer Registry Hijack (eventvwr.exe) ===
  # Attackers set HKCU\Software\Classes\mscfile\shell\open\command to launch payload
  selection_eventvwr:
    Image|endswith: '\eventvwr.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  condition_eventvwr: selection_eventvwr

  # === Technique 2: Fodhelper.exe ms-settings Hijack ===
  # Attackers set HKCU\Software\Classes\ms-settings\shell\open\command to auto-elevate
  selection_fodhelper:
    Image|endswith: '\fodhelper.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  condition_fodhelper: selection_fodhelper

  # === Technique 3: ComputerDefaults.exe ms-settings Hijack ===
  selection_computerdefaults:
    Image|endswith: '\computerdefaults.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  condition_computerdefaults: selection_computerdefaults

  # === Technique 4: SDCLT.exe Bypass ===
  # Attackers modify HKCU\Software\Microsoft\Windows\CurrentVersion\App Paths\control.exe
  selection_sdclt:
    Image|endswith: '\sdclt.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
  condition_sdclt: selection_sdclt

  # === Technique 5: SilentCleanup Scheduled Task Abuse ===
  # Windows scheduled task that auto-elevates; attacker runs payload via %windir%\System32\cleanmgr.exe
  selection_silentcleanup_parent:
    Image|endswith:
      - '\cleanmgr.exe'
      - '\schtasks.exe'
    CommandLine|contains:
      - 'SilentCleanup'
      - '/TN'
      - '\Microsoft\Windows\Maintenance\WinSAT'
  selection_silentcleanup_cmd:
    Image|endswith: '\cleanmgr.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
  condition_silentcleanup: selection_silentcleanup_parent or selection_silentcleanup_cmd

  # === Technique 6: CMSTPLUA COM Interface ===
  # CMSTPLUA.UAC COM interface auto-elevates; invoked via rundll32 or mshta
  selection_cmstplua_cmd:
    Image|endswith:
      - '\rundll32.exe'
      - '\mshta.exe'
    CommandLine|contains:
      - 'CMSTPLUA'
      - '{3E5FC7F9-9A51-4367-9063-A120244FB27B}'
  selection_cmstplua_com:
    Image|endswith:
      - '\rundll32.exe'
      - '\mshta.exe'
    CommandLine|re: '(?i)CMSTP|cmstp\.dll'
  condition_cmstplua: selection_cmstplua_cmd or selection_cmstplua_com

  # === Technique 7: .NET Assembly Loading for UAC Bypass ===
  # Attackers load .NET assemblies via Add-Type or Assembly.Load to bypass UAC
  selection_net_asm:
    Image|endswith:
      - '\rundll32.exe'
      - '\regsvr32.exe'
    CommandLine|contains:
      - 'Assembly.Load'
      - 'System.Management.Automation'
      - 'System.Diagnostics.Process'
      - 'Microsoft.VisualBasic.Interaction'
  condition_net_asm: selection_net_asm

  # === Technique 8: DLL Hijacking via Auto-Elevating EXEs ===
  # Attackers place malicious DLLs alongside auto-elevating executables
  # Examples: dllhijack via explorer.exe, consent.exe, or other auto-elevating processes
  selection_dll_hijack:
    Image|endswith:
      - '\explorer.exe'
      - '\consent.exe'
    CommandLine|contains:
      - '/s'   # Silent elevation flag
      - '--system'
  selection_dll_hijack_child:
    ParentImage|endswith:
      - '\explorer.exe'
      - '\consent.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\mshta.exe'
      - '\wscript.exe'
  condition_dll_hijack: selection_dll_hijack or selection_dll_hijack_child

  # === Technique 9: Registry Keys Used for UAC Bypass ===
  # Detects direct modification of registry keys commonly abused for UAC bypass
  # Requires sysmon event_id=12 or Windows event_id=4657
  selection_registry_keys:
    TargetObject|contains:
      - '\Software\Classes\ms-settings\shell\open\command'
      - '\Software\Classes\mscfile\shell\open\command'
      - '\Software\Microsoft\Windows\CurrentVersion\App Paths\control.exe'
      - '\Software\Classes\batfile\shell\open\command'
      - '\Software\Classes\cmdfile\shell\open\command'
      - '\Software\Classes\exefile\shell\open\command'
  condition_registry_keys: selection_registry_keys

  # === Combined Condition ===
  condition: >
    condition_eventvwr or
    condition_fodhelper or
    condition_computerdefaults or
    condition_sdclt or
    condition_silentcleanup or
    condition_cmstplua or
    condition_net_asm or
    condition_dll_hijack or
    condition_registry_keys

falsepositives:
  - Legitimate administrative workflows using eventvwr.exe from script
  - System Center or other management tools invoking fodhelper.exe
  - IT staff running computerdefaults.exe for configuration
  - Scheduled task management invoking SilentCleanup legitimately
  - Software installation using CMSTPLUA COM interface
level: high

