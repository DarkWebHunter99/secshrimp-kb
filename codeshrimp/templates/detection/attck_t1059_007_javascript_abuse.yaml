    Image|endswith:
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\node.exe'
  condition: selection
  timeframe: 30m
  threshold:
    type: threshold
    track: by_host
    count: 3
    seconds: 1800
falsepositives: []
level: critical
