# ============================================================
# 5. JScript .NET / .NET 反射调用
# ============================================================

title: JScript .NET Execution via MSBuild
id: e6f7a8b9-1059-007-004-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测通过 MSBuild 执行 JScript .NET 代码。
  攻击者利用 MSBuild 的 Tasks 功能执行任意代码。
tags:
  - attack.execution
  - attack.t1218
  - attack.t1059.007
logsource:
  category: process_creation
  product: windows
detection:
  selection_msbuild:
    Image|endswith: '\msbuild.exe'
  selection_inline_task:
    CommandLine|contains:
      - '/p:PreBuildEvent'
      - '/p:PostBuildEvent'
      - 'UsingTask'
      - 'CodeTaskFactory'
  condition: selection_msbuild and selection_inline_task
falsepositives:
  - 合法的 .NET 构建过程
level: medium
---

# ============================================================
# 6. PowerShell 调用 JavaScript 引擎
# ============================================================

title: PowerShell Invokes JavaScript Engine
id: e6f7a8b9-1059-007-005-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测 PowerShell 调用 Windows Script Host 的 JScript 引擎。
  攻击者使用 PowerShell 的 COM 对象调用 JScript 执行代码。
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1059.007
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_jscript:
    CommandLine|contains:
      - 'New-Object -ComObject MSScriptControl.ScriptControl'
      - 'MSScriptControl.ScriptControl'
      - 'ScriptControl'
      - '.Language = "JScript"'
      - 'AddCode('
      - 'Eval('
  condition: selection_powershell and selection_jscript
falsepositives:
  - 合法的脚本集成
level: high
---

# ============================================================
# 7. Windows Script Host 持久化
# ============================================================

title: WSH Persistence via Registry
id: e6f7a8b9-1059-007-006-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测通过注册表实现的 Windows Script Host 持久化。
  攻击者修改注册表使 .vbs/.js 文件关联到恶意处理器。
tags:
  - attack.persistence
  - attack.t1546
  - attack.t1059.007
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4657
    ObjectName|contains:
      - '\\Classes\\.vbs'
      - '\\Classes\\.js'
      - '\\Classes\\.wsf'
      - '\\Classes\\.jse'
      - 'ShellEx\\Open'
  condition: selection
falsepositives:
  - 安装/卸载脚本宿主软件
level: medium
---

# ============================================================
# 8. 混淆 JScript/VBScript 检测
# ============================================================

title: Obfuscated Script Execution
id: e6f7a8b9-1059-007-007-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测混淆的 JScript/VBScript 代码执行。
  攻击者使用 Chr()、String.fromCharCode、Base64 编码混淆恶意代码。
tags:
  - attack.defense_evasion
  - attack.t1027
  - attack.t1059.007
logsource:
  category: process_creation
  product: windows
detection:
  selection_script_host:
    Image|endswith:
      - '\wscript.exe'
      - '\cscript.exe'
  selection_obfuscation:
    CommandLine|contains:
      # VBScript 混淆
      - 'Chr('
      - 'ChrW('
      - 'Replace('
      - 'Execute('
      - 'ExecuteGlobal('
      # JScript 混淆
      - 'String.fromCharCode'
      - 'unescape('
      - 'atob('
      - 'fromCharCode'
      # 通用混淆
      - 'Replace('
      - 'Mid('
      - 'InStr('
  condition: selection_script_host and selection_obfuscation
falsepositives:
  - 合法的混淆脚本
level: high
---

# ============================================================
# 9. 攻击链关联
# ============================================================

title: JavaScript Abuse Attack Chain
id: e6f7a8b9-1059-007-008-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  关联多个 JavaScript 滥用行为，识别完整攻击链。
tags:
  - attack.execution
  - attack.t1059.007
  - attack.chain
logsource:
  category: process_creation
  product: windows
detection:
