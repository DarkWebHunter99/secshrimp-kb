# ============================================================
# MITRE ATT&CK T1552 — 不安全凭据存储检测
# ============================================================
# Technique: T1552 - Unsecured Credentials
# Platform: Windows, Linux, macOS
# Tactics: Credential Access
# Covers: 文件中的明文凭据 / 注册表凭据 / 浏览器存储 / 云凭据文件
# ============================================================

title: Unsecured Credentials Detection Suite
id: f7a8b9c0-t1552-000-000
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测不安全的凭据存储和访问行为。攻击者常从配置文件、
  注册表、浏览器存储和云凭据文件中提取明文凭据。

---

# ============================================================
# 1. 文件中的明文凭据访问
# ============================================================
# T1552.001 — Credentials In Files

title: Suspicious Access to Files Containing Credentials
id: f7a8b9c0-t1552-001-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测对已知包含凭据的文件的可疑访问。
tags:
  - attack.credential_access
  - attack.t1552.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      # Windows 凭据文件
      - '\\Windows\\System32\\config\\SAM'
      - '\\Windows\\System32\\config\\SYSTEM'
      - '\\Windows\\System32\\config\\SECURITY'
      - '\\Windows\\NTDS\\ntds.dit'
      # IIS 配置
      - 'web.config'
      - 'applicationHost.config'
      # 数据库配置
      - 'connectionString'
      - 'Data Source='
      # 常见配置文件
      - '.env'
      - 'config.json'
      - 'credentials.json'
      - 'service-account.json'
      - 'keyfile'
      - 'id_rsa'
      - 'id_dsa'
      - 'id_ecdsa'
      - 'id_ed25519'
  condition: selection
falsepositives:
  - 合法的系统管理操作
  - 备份软件访问 SAM
level: high
---

title: SAM Database Extraction
id: f7a8b9c0-t1552-001-002
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测 SAM 数据库提取行为（reg save / secretsdump）。
tags:
  - attack.credential_access
  - attack.t1003.002
  - attack.t1552.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'reg save'
      - 'reg.exe save'
      - 'HKLM\\SAM'
      - 'HKLM\\SYSTEM'
      - 'HKLM\\SECURITY'
      - 'secretsdump'
      - 'sam'
      - 'ntds.dit'
  condition: selection
falsepositives:
  - 系统备份操作
  - 合法的密码恢复
level: critical
---

# ============================================================
# 2. 注册表中的凭据
# ============================================================
# T1552.002 — Registry Storage Keys

title: Credentials Stored in Registry
id: f7a8b9c0-t1552-002-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测从注册表中读取存储的凭据（如 RDP 凭据、AutoLogon 密码）。
tags:
  - attack.credential_access
  - attack.t1552.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4657
    ObjectName|contains:
      # RDP 凭据
      - '\\Terminal Server Client\\Default'
      - '\\Terminal Server Client\\Servers'
      # AutoLogon
      - '\\Winlogon\\DefaultPassword'
      - '\\Winlogon\\AlternateShell'
      # VNC
      - '\\ORL\\WinVNC3\\Password'
      - '\\TightVNC\\Server'
      # Putty
      - '\\Software\\SimonTatham\\PuTTY\\Sessions'
  condition: selection
falsepositives:
  - 合法的 RDP 连接管理
level: high
---

# ============================================================
# 3. 浏览器凭据存储
# ============================================================
# T1552.003 — Browser Credentials

title: Browser Credential Database Access
id: f7a8b9c0-t1552-003-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测对浏览器凭据数据库的访问。
tags:
  - attack.credential_access
  - attack.t1552.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      # Chrome
      - 'Login Data'
      - 'Default\\Login Data'
      - 'LoginData'
      # Firefox
      - 'logins.json'
      - 'key4.db'
      - 'signons.sqlite'
      # Edge
      - 'Edge\\User Data\\Default\\Login Data'
      # 通用
      - 'cookies.sqlite'
      - 'formhistory.sqlite'
  selection_browser:
    ParentImage|endswith:
      - '\chrome.exe'
      - '\firefox.exe'
      - '\msedge.exe'
      - '\brave.exe'
      - '\opera.exe'
  condition: selection and not selection_browser
falsepositives:
  - 密码管理器扩展
  - 浏览器更新过程
level: high
---

# ============================================================
# 4. 云凭据文件
# ============================================================
# T1552.005 — Cloud Instance Metadata

title: Cloud Credentials File Access
id: f7a8b9c0-t1552-005-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测对云凭据文件的访问。
tags:
  - attack.credential_access
  - attack.t1552.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      # AWS
      - '.aws\\credentials'
      - '.aws\\config'
      - 'aws_access_key_id'
      - 'aws_secret_access_key'
      # Azure
      - '.azure\\accessTokens.json'
      - '.azure\\azureProfile.json'
      # GCP
      - '.gcloud\\credentials.db'
      - '.config\\gcloud\\credentials.db'
      - 'application_default_credentials.json'
      # Kubernetes
      - '.kube\\config'
      - 'serviceaccount\\token'
      # Docker
      - '.docker\\config.json'
      - '.dockercfg'
  condition: selection
falsepositives:
  - 合法的云 CLI 操作
level: high
---

# ============================================================
# 5. 凭据文件搜索
# ============================================================

title: Credential File Discovery
id: f7a8b9c0-t1552-000-001
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测搜索凭据文件的行为。攻击者使用 find/dir 命令
  搜索密码文件、密钥文件和配置文件。
tags:
  - attack.discovery
  - attack.t1083
  - attack.t1552
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      # 搜索密钥文件
      - 'dir /s /b *.pem'
      - 'dir /s /b *.key'
      - 'dir /s /b *.p12'
      - 'dir /s /b *.pfx'
      - 'dir /s /b *.jks'
      - 'dir /s /b *.keystore'
      - 'dir /s /b id_rsa*'
      - 'dir /s /b .ssh'
      # 搜索配置文件
      - 'dir /s /b web.config'
      - 'dir /s /b *.env'
      - 'dir /s /b settings.json'
      - 'dir /s /b credentials*'
      # Linux (WSL/Git Bash)
      - 'find / -name "*.pem"'
      - 'find / -name "id_rsa"'
      - 'find / -name ".env"'
      - 'find / -name "credentials"'
  condition: selection
falsepositives:
  - IT 资产盘点
  - 合法的密钥管理
level: medium
---

# ============================================================
# 6. 密码喷洒/凭据填充
# ============================================================

title: Password Spray Attempt
id: f7a8b9c0-t1552-000-002
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测密码喷洒攻击 — 使用少量密码尝试大量账户。
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  condition: selection
  timeframe: 300s
  threshold:
    type threshold
    track: by_src_ip
    count: 20
    seconds: 300
falsepositives:
  - 用户忘记密码
  - 服务账户密码轮换
level: high
---

title: Brute Force Login Attempt
id: f7a8b9c0-t1552-000-003
status: experimental
author: CodeShrimp
date: 2026/05/12
description: |
  检测暴力破解登录尝试 — 大量失败后突然成功。
tags:
  - attack.credential_access
  - attack.t1110.001
logsource:
  product: windows
  service: security
detection:
  selection_fail:
    EventID: 4625
  selection_success:
    EventID: 4624
    LogonType: 10
  condition: selection_fail and selection_success
  timeframe: 600s
  threshold:
    type threshold
    track: by_src_ip
    count: 30
    seconds: 600
falsepositives:
  - 合法的远程管理
level: high
