title: PowerShell Encoded Command Execution - T1059.001
id: 7a4c8f2e-3b1a-4d9e-b5f6-1a2c3d4e5f6a
status: stable
description: |
  Detects execution of PowerShell with -EncodedCommand / -enc flags.
  Adversaries frequently use Base64-encoded commands to obfuscate
  malicious payloads and evade basic command-line monitoring.
  Maps to MITRE ATT&CK T1059.001 (Command and Scripting Interpreter: PowerShell).
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_profiles
author: CodeShrimp Detection Engineering
date: 2026/05/14
modified: 2026/05/14
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection_encoded:
    - Image|endswith:
        - '\powershell.exe'
        - '\pwsh.exe'
    - CommandLine|contains:
        - '-EncodedCommand'
        - '-enc '
        - '-e '
        - '-ec '
  selection_bypass_flags:
    - Image|endswith:
        - '\powershell.exe'
        - '\pwsh.exe'
    - CommandLine|contains:
        - '-WindowStyle Hidden'
        - '-w hidden'
        - '-NoProfile'
        - '-NonInteractive'
        - '-ExecutionPolicy Bypass'
        - '-ep bypass'
  condition: selection_encoded or (selection_bypass_flags and selection_encoded)
fields:
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - IntegrityLevel
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - CI/CD pipelines that pass credentials via encoded parameters
level: high
