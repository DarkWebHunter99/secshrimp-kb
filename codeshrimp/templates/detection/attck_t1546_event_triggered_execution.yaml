title: Screensaver Persistence via Registry
id: a1b2c3d4-1546-002-001
status: stable
description: |
  Detects screensaver persistence (T1546.002).
  Attackers set a malicious executable as the screensaver to
  execute code when the screensaver activates.
references:
  - https://attack.mitre.org/techniques/T1546/002/
author: CodeShrimp (auto-generated)
date: 2026/05/08
tags:
  - attack.persistence
  - attack.t1546.002
logsource:
  category: registry_set
  product: windows
detection:
  selection_screensaver:
    TargetObject|contains:
      - '\Control Panel\Desktop\SCRNSAVE.EXE'
  filter_legitimate:
    Details|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  condition: selection_screensaver and not filter_legitimate
falsepositives:
  - Users setting custom screensavers (verify path)
level: medium
