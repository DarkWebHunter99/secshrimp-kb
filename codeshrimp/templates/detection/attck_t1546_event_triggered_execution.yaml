title: WMI Event Subscription Persistence
id: a1b2c3d4-1546-003-001
status: stable
description: |
  Detects WMI event subscription persistence (T1546.003).
  Attackers create WMI event filters and consumers to execute
  malicious code when specific system events occur.
references:
  - https://attack.mitre.org/techniques/T1546/003/
  - https://pentestlab.blog/2020/01/21/persistence-wmi-event-subscription/
author: CodeShrimp (auto-generated)
date: 2026/05/08
tags:
  - attack.persistence
  - attack.t1546.003
logsource:
  category: wmi_event
  product: windows
detection:
  selection_persistence:
    EventID:
      - 5861  # WMI Permanent Event Registration
      - 5859  # WMI Temporary Event Registration
  filter_known_good:
    Query|contains:
      - 'SELECT * FROM __InstanceModificationEvent WITHIN 60 WHERE TargetInstance ISA "Win32_PerfFormattedData_PerfOS_System"'
  condition: selection_persistence and not filter_known_good
falsepositives:
  - SCCM and other management tools use WMI subscriptions
  - Monitoring software (SCOM, etc.)
level: high

