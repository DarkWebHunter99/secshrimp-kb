title: Image File Execution Options - Debugger Injection
id: a1b2c3d4-1546-012-001
status: stable
description: |
  Detects IFEO debugger injection (T1546.012).
  Attackers set a debugger on legitimate binaries so that when
  the binary runs, the debugger (malicious) executes instead.
references:
  - https://attack.mitre.org/techniques/T1546/012/
  - https://www.elastic.co/security-research/detecting-ifoo-persistence
author: CodeShrimp (auto-generated)
date: 2026/05/08
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1546.012
logsource:
  category: registry_set
  product: windows
detection:
  selection_ifeo_debugger:
    TargetObject|contains: '\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\'
    TargetObject|endswith: '\Debugger'
  filter_system_debuggers:
    Details|contains:
      - 'vsjitdebugger.exe'
      - 'ntsd.exe'
      - 'cdb.exe'
      - 'windbg.exe'
  filter_legitimate_paths:
    Details|startswith:
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'
      - 'C:\Windows\System32\'
  condition: selection_ifeo_debugger and not filter_system_debuggers and not filter_legitimate_paths
falsepositives:
  - Developer machines with Visual Studio installed
  - Application compatibility shims
level: high

