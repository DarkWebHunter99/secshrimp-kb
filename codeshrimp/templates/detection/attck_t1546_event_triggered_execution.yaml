# ============================================================
# MITRE ATT&CK T1546 — Event Triggered Execution
# ============================================================
# Technique: T1546 - Event Triggered Execution
# Sub-techniques: T1546.002 (Screensaver), T1546.003 (WMI),
#                 T1546.008 (Accessibility Features),
#                 T1546.010 (AppInit DLLs),
#                 T1546.011 (Image File Execution Options),
#                 T1546.012 (Image File Execution Options - Debugger)
# Platform: Windows
# Tactics: Privilege Escalation, Persistence
# ============================================================

title: Event Triggered Execution - Accessibility Features Hijack
id: a1b2c3d4-1546-008-001
status: stable
description: |
  Detects persistence via Accessibility Features (T1546.008).
  Attackers replace or debug accessibility binaries (sethc.exe, utilman.exe,
  osk.exe, magnify.exe, narrator.exe, displayswitch.exe) to gain SYSTEM
  access from the login screen.
references:
  - https://attack.mitre.org/techniques/T1546/008/
  - https://www.elastic.co/guide/en/security/current/persistence-via-registry-run-keys.html
author: CodeShrimp (auto-generated)
date: 2026/05/08
tags:
  - attack.privilege_escalation
  - attack.persistence
  - attack.t1546.008
logsource:
  category: registry_set
  product: windows
detection:
  selection_debugger:
    TargetObject|contains:
      - 'Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sethc.exe'
      - 'Microsoft\Windows NT\CurrentVersion\Image File Execution Options\utilman.exe'
      - 'Microsoft\Windows NT\CurrentVersion\Image File Execution Options\osk.exe'
      - 'Microsoft\Windows NT\CurrentVersion\Image File Execution Options\magnify.exe'
      - 'Microsoft\Windows NT\CurrentVersion\Image File Execution Options\narrator.exe'
      - 'Microsoft\Windows NT\CurrentVersion\Image File Execution Options\displayswitch.exe'
    Details|contains: 'Debugger'
  filter_legitimate:
    Details:
      - 'C:\Windows\System32\*\*.exe'
  condition: selection_debugger and not filter_legitimate
falsepositives:
  - Legitimate accessibility tool configuration (rare)
level: high

