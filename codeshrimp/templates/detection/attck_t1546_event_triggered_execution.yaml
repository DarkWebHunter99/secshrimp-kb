title: AppInit DLLs Persistence
id: a1b2c3d4-1546-010-001
status: stable
description: |
  Detects AppInit DLLs persistence (T1546.010).
  Attackers add malicious DLLs to the AppInit_DLLs registry value,
  which loads into every process that loads User32.dll.
references:
  - https://attack.mitre.org/techniques/T1546/010/
author: CodeShrimp (auto-generated)
date: 2026/05/08
tags:
  - attack.persistence
  - attack.t1546.010
logsource:
  category: registry_set
  product: windows
detection:
  selection_appinit:
    TargetObject|contains:
      - '\Windows NT\CurrentVersion\Windows\AppInit_DLLs'
    Details|contains:
      - '.dll'
  filter_empty:
    Details: ''
  condition: selection_appinit and not filter_empty
falsepositives:
  - Some enterprise software legitimately uses AppInit DLLs (rare)
level: critical

