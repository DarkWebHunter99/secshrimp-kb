# Purpose: 检测 LOLBAS 代理执行 — mshta/certutil/regsvr32 被滥用于下载和执行
# Auth: 检测规则，可开源共享
# Dependencies: Sigma >= 2.0, Sysmon 或 Windows Security 日志
# MITRE ATT&CK: T1218 (System Binary Proxy Execution)
#   - T1218.005 (Mshta)
#   - T1218.001 (Regsvr32)
#   - T1218.003 (CMSTP)
#   - T1105 (Ingress Tool Transfer)
# Usage:
#   sigmac -t elasticsearch -c sysmon sigma_lolbas_proxy_execution.yml
#   sigmac -t splunk sigma_lolbas_proxy_execution.yml

title: LOLBAS 代理执行 — 可疑下载/执行链
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: |
  检测攻击者滥用 Windows LOLBAS（Living Off The Land Binaries and Scripts）
  进行代理执行和下载。mshta.exe 可执行远程 HTA 文件，certutil.exe 可下载
  文件，regsvr32.exe 可执行远程脚本（SCT）。这些是 APT 和勒索软件常用的
  绕过应用白名单技术。
references:
  - https://attack.mitre.org/techniques/T1218/005/
  - https://attack.mitre.org/techniques/T1218/001/
  - https://lolbas-project.github.io/
  - https://docs.microsoft.com/en-us/windows/win32/termserv/using-certutil
author: 代码虾 (CodeShrimp)
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.t1218
  - attack.t1218.005
  - attack.t1218.001
  - attack.t1105

logsource:
  product: windows
  category: process_creation
  service: sysmon

detection:
  # ============================================================
  # 1. mshta.exe 执行远程 HTA
  # ============================================================
  selection_mshta:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'javascript:'
      - 'vbscript:'
      - '.hta'

  # mshta 也可能用于执行内联 JS/VBS
  selection_mshta_inline:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'eval('
      - 'CreateObject'
      - 'WScript.Shell'
      - 'PowerShell'
      - 'cmd'

  # ============================================================
  # 2. certutil.exe 下载文件
  # ============================================================
  selection_certutil_download:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-urlcache'
      - '-split'
      - 'http://'
      - 'https://'
      - '-f '  # force overwrite

  # certutil 解码（常用于解码 base64 payload）
  selection_certutil_decode:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-decode'
      - '-encode'

  # ============================================================
  # 3. regsvr32.exe 执行远程脚本 (SCT)
  # ============================================================
  selection_regsvr32:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - '/i:http'
      - '/i:ftp'
      - 'scrobj.dll'
      - '/s'  # silent mode
      - '/n'  # do not call DllRegisterServer

  # ============================================================
  # 4. rundll32 可疑执行
  # ============================================================
  selection_rundll32:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains:
      - 'javascript:'
      - 'mshtml,'
      - 'mshta'
      - 'url.dll'
      - 'zipfldr.dll'

  # ============================================================
  # 排除已知合法场景
  # ============================================================
  filter_legitimate_mshta:
    Image|endswith: '\mshta.exe'
    ParentImage|endswith:
      - '\ccmsetup.exe'   # SCCM
      - '\ccmexec.exe'
      - '\wscript.exe'    # 管理脚本
    User|contains:
      - 'SYSTEM'

  filter_legitimate_certutil:
    Image|endswith: '\certutil.exe'
    # certutil 合法用于证书管理，排除非下载场景
    # 如果只有 -decode 且目标是本地文件，降低风险
    # 此处不做排除，由 level 控制

  filter_legitimate_regsvr32:
    Image|endswith: '\regsvr32.exe'
    # 排除微软签名组件注册
    # 实际环境中需要结合 CommandLine 判断

  condition: (selection_mshta or selection_mshta_inline or
              selection_certutil_download or selection_certutil_decode or
              selection_regsvr32 or selection_rundll32) and
             not 1 of filter_legitimate_*

# ============================================================
# 级别: 根据具体 LOLBAS 分类
# ============================================================
# mshta + URL → high（几乎无合法场景）
# certutil + URL → high（下载场景高度可疑）
# certutil -decode → medium（可能用于合法证书操作）
# regsvr32 + /i:http → high（几乎无合法场景）
level: high

falsepositives:
  - SCCM 使用 mshta 部署软件包
  - 管理员使用 certutil 管理证书（-decode 场景）
  - 软件安装使用 regsvr32 注册 COM 组件
  - 建议结合 User、ParentImage、时间窗口进一步过滤
